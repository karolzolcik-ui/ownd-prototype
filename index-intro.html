        <div style={{ background: rival.color, borderRadius: 999, padding: '3px 14px', marginTop: -10, boxShadow: '0 4px 10px rgba(0,0,0,.3)', animation: 'in-up .4s ease .1s both' }}>
          <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12.5, color: '#fff' }}>{rival.name} · local rival</span>
        </div>
        <div style={{ position: 'relative', background: '#182233', border: '2.5px solid #f5c84b', borderRadius: 18, padding: '13px 18px', maxWidth: 320, marginTop: 16, animation: 'in-bubble .45s ease .25s both' }}>
          <div style={{ position: 'absolute', bottom: '100%', left: '50%', width: 13, height: 13, background: '#182233', borderLeft: '2.5px solid #f5c84b', borderTop: '2.5px solid #f5c84b', transform: 'translate(-50%, 7px) rotate(45deg)' }} />
          <span style={{ fontFamily: 'Fredoka', fontWeight: 600, fontSize: 16.5, color: '#fff', lineHeight: 1.35 }}>“Cute deed. The rest of this city? <b style={{ color: t.gold }}>Mine.</b>”</span>
        </div>
      </div>
      {/* starter portfolio fan */}
      <div style={{ position: 'relative', width: 300, height: 132, marginTop: 26 }}>
        {fan.map((k, i) => {
          const ty = TYPES[k];
          const rot = (i - 4) * 7, lift = Math.abs(i - 4) * 7;
          return (
            <div key={i} style={{ position: 'absolute', left: '50%', bottom: 0, transformOrigin: 'bottom center', transform: `translateX(-50%) rotate(${rot}deg) translateY(${lift}px)` }}>
              <div style={{ animation: `in-up .35s ease ${0.5 + i * 0.05}s both` }}>
                <div style={{ width: 58, height: 80, borderRadius: 9, background: `linear-gradient(160deg, ${shade(ty.color, .2)}, ${ty.color})`, border: '2.5px solid #fff', boxShadow: '0 6px 14px rgba(0,0,0,.35)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon type={ty.icon} size={20} color="rgba(255,255,255,.9)" stroke={2.2} />
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 10.5, letterSpacing: 1.5, color: 'rgba(255,255,255,.6)', marginTop: 10, animation: 'in-up .4s ease .9s both' }}>YOUR STARTER PORTFOLIO · 9 DEEDS</div>
      <div style={{ textAlign: 'center', marginTop: 14 }}>
        <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 26, color: '#fff', animation: 'in-up .4s ease .55s both' }}>Prove you can play.</div>
        <div style={{ fontSize: 14.5, fontWeight: 700, color: 'rgba(255,255,255,.75)', maxWidth: 320, margin: '7px auto 0', lineHeight: 1.45, animation: 'in-up .4s ease .65s both' }}>
          Beat the locals in card duels, climb the investor board — and <b style={{ color: '#fff' }}>better deeds follow every win</b>.
        </div>
      </div>
    </div>
  );
}

const BEATS = [
  { comp: BeatDeed, cta: 'Where do deeds come from?' },
  { comp: BeatMap, cta: 'Got it' },
  { comp: BeatRival, cta: 'Show me the rules' },
];

function NarrativeIntro({ onDone }) {
  const t = useT();
  const [beat, setBeat] = useState(0);
  const B = BEATS[beat].comp;
  const next = () => {
    window.SFX && window.SFX.play('select');
    if (beat < BEATS.length - 1) setBeat(b => b + 1); else onDone();
  };
  return (
    <div data-screen-label={'Intro ' + (beat + 1)} style={{ position: 'absolute', inset: 0, background: `linear-gradient(180deg, ${shade(t.arena, .25)}, ${t.arena})`, display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '52px 24px 38px', overflow: 'hidden' }}>
      <style>{INTRO_FX}</style>
      <div style={{ position: 'absolute', inset: 0, opacity: .12, backgroundImage: 'radial-gradient(circle at 26% 22%, #fff 0 1.4px, transparent 1.4px), radial-gradient(circle at 74% 68%, #fff 0 1.4px, transparent 1.4px)', backgroundSize: '44px 44px' }} />
      <button onClick={() => { window.SFX && window.SFX.play('deselect'); onDone(); }} style={{ position: 'absolute', top: 10, left: 12, zIndex: 5, background: 'rgba(255,255,255,.12)', color: 'rgba(255,255,255,.75)', fontFamily: 'Fredoka', fontWeight: 600, fontSize: 12.5, padding: '5px 13px', borderRadius: 999 }}>Skip</button>
      <B key={beat} />
      <div style={{ position: 'relative', zIndex: 2, width: '100%', marginTop: 18 }}>
        <div style={{ display: 'flex', justifyContent: 'center', gap: 7, marginBottom: 14 }}>
          {BEATS.map((_, i) => <span key={i} onClick={() => setBeat(i)} style={{ width: i === beat ? 26 : 9, height: 9, borderRadius: 999, background: i === beat ? t.gold : 'rgba(255,255,255,.3)', transition: 'all .25s', cursor: 'pointer' }} />)}
        </div>
        <Btn full onClick={next}>{BEATS[beat].cta}</Btn>
      </div>
    </div>
  );
}

Object.assign(window, { NarrativeIntro });

</script>
  <script type="text/babel">
// OWND v2 — root app: rules → 3 winnable card-PvP duels with leaderboard climb → league cup → world map
const { useState, useEffect, useMemo } = React;
const { IOSDevice } = window;
const { useTweaks, TweaksPanel, TweakSection, TweakColor, TweakToggle, TweakButton } = window;
const {
  ThemeCtx, useT, makePalette, TYPES, shade, Icon, Btn, Confetti, DealGame,
  ONB, RulesIntro, MatchScreen, RewardScreen, BoardScreen, ChampionScreen,
  LeagueHub, RankedIntro, SwapReward, NarrativeIntro,
} = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#16a866",
  "night": false,
  "pvpTimer": true,
  "hintTypes": true,
  "liveThreats": true,
  "sound": true
}/*EDITMODE-END*/;
const ACCENTS = ['#16a866', '#2f7df6', '#7a5af0', '#e0559b'];

const SAVE = 'ownd_v2';
function load() { try { const s = JSON.parse(localStorage.getItem(SAVE)); if (s && s.phase) return s; } catch (e) {} return null; }

const T3 = ['heritage', 'nature', 'social'];
const GLYPH = { heritage: 'landmark', nature: 'park', social: 'cafe' };
const CASH_SPEC = [1, 1, 2, 2, 3, 3];

// starter deck — 9 place cards, all worth 1M
const STARTER_PROPS = [
  { id: 'p_wawel',    name: 'Wawel Castle',        type: 'heritage', place: 'landmark', m: 1 },
  { id: 'p_mariacki', name: "St. Mary's Basilica",  type: 'heritage', place: 'landmark', m: 1 },
  { id: 'p_florian',  name: "Florian's Gate",       type: 'heritage', place: 'landmark', m: 1 },
  { id: 'p_planty',   name: 'Planty Park',          type: 'nature',   place: 'park',     m: 1 },
  { id: 'p_zakrz',    name: 'Zakrzówek Lagoon',     type: 'nature',   place: 'park',     m: 1 },
  { id: 'p_vistula',  name: 'Vistula Boulevard',    type: 'nature',   place: 'park',     m: 1 },
  { id: 'p_cloth',    name: 'Cloth Hall',           type: 'social',   place: 'shop',     m: 1 },
  { id: 'p_kazim',    name: 'Kazimierz Quarter',    type: 'social',   place: 'cafe',     m: 1 },
  { id: 'p_oldtown',  name: 'Old Town Square',      type: 'social',   place: 'cafe',     m: 1 },
];
// starter action cards now come from the match options (capital ×2 + draw2 by default — no attack cards in game 1)

// onboarding win rewards: upgrade one card of a colour (action-card unlocks come from the options schedule)
const LEVEL_REWARDS = [
  { type: 'heritage', m: 2, explain: true },
  { type: 'nature',   m: 3 },
  { type: 'social',   m: 3 },
];
// onboarding foe strength per level (rigged, kept gentle — no attacks in game 1)
const ONB_FOE = [
  { foeM: 1, foeActions: ['capital'] },
  { foeM: 1, foeActions: ['capital', 'draw2'] },
  { foeM: 2, foeActions: ['capital', 'destroy', 'draw2'] },
];

const LEAGUES2 = [
  { name: 'Bronze',  color: '#b07a44' },
  { name: 'Silver',  color: '#9aa7b4' },
  { name: 'Gold',    color: '#e0a83a' },
  { name: 'Emerald', color: '#1fae7a' },
  { name: 'Diamond', color: '#8b5cf6' },
];
const PROMOTE_AT = 90;
const RANKED_FOES = [
  { name: 'Theo', color: '#2f7df6' }, { name: 'Mara', color: '#e0559b' }, { name: 'Priya', color: '#7a5af0' },
  { name: 'Kenji', color: '#f0883c' }, { name: 'Iris', color: '#22a58a' }, { name: 'Bo', color: '#b3312e' },
];
const REWARD_NAMES = {
  heritage: ['Palace of Culture', 'The Sejm', 'Sensō-ji Temple', 'Golden Gate Bridge', 'Painted Ladies'],
  nature:   ['Łazienki Park', 'Muir Woods', 'Dolores Park', 'Mt. Fuji View', 'Central Park'],
  social:   ['Neon Museum', 'Cable Car', 'Pier 39', 'Shibuya Crossing', 'Times Square'],
};
const rnd = (a) => a[Math.floor(Math.random() * a.length)];

/* ── technical match options (persisted separately from the game save, survive restarts) ── */
const SETTINGS_KEY = 'ownd2_settings';
// unlock order: basics first, the advanced cards land on later wins
const ACTION_META = [
  { k: 'capital', starter: true }, { k: 'draw2', starter: true },
  { k: 'destroy' }, { k: 'heist' }, { k: 'confiscate' }, { k: 'steal' },
  { k: 'shield' }, { k: 'takeover' }, { k: 'legal' }, { k: 'flip' },
];
const SETTINGS_DEFAULT = { startHand: 3, draw: 3, actions: { capital: 2, draw2: 1, destroy: 1, heist: 1, confiscate: 1, steal: 1, shield: 0, takeover: 1, legal: 1, flip: 1 } };
function getOwndSettings2() {
  try { const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)); if (s) return { ...SETTINGS_DEFAULT, ...s, actions: { ...SETTINGS_DEFAULT.actions, ...(s.actions || {}) } }; } catch (e) {}
  return JSON.parse(JSON.stringify(SETTINGS_DEFAULT));
}
window.getOwndSettings2 = getOwndSettings2; // the duel engine reads hand size / draw / allowed foe actions from here
// selected non-starter kinds split across the three onboarding wins
function actionBuckets(st) {
  const kinds = ACTION_META.filter(m => !m.starter && (st.actions[m.k] || 0) > 0).map(m => m.k);
  const n = kinds.length, b = Math.floor(n / 3), r = n % 3;
  const sizes = [b + (r > 0 ? 1 : 0), b + (r > 1 ? 1 : 0), b];
  const out = []; let i = 0;
  for (const sz of sizes) { out.push(kinds.slice(i, i + sz)); i += sz; }
  return out;
}
// the action cards the player owns after `wins` onboarding wins
function actionsForWins(st, wins) {
  const acts = [];
  ACTION_META.filter(m => m.starter).forEach(m => { for (let i = 0; i < (st.actions[m.k] || 0); i++) acts.push(m.k); });
  actionBuckets(st).slice(0, Math.min(wins, 3)).forEach(kb => kb.forEach(k => { for (let i = 0; i < (st.actions[k] || 0); i++) acts.push(k); }));
  return acts;
}

// true on a real phone (or a narrow window / ?phone) → render full-bleed instead of the device mockup
function useIsPhone() {
  const get = () => (typeof window !== 'undefined' && window.owndPhoneMode)
    ? window.owndPhoneMode()
    : (typeof window !== 'undefined' && window.matchMedia('(max-width: 560px)').matches);
  const [phone, setPhone] = useState(get);
  useEffect(() => {
    const on = () => setPhone(get());
    on(); // correct any stale first-paint value (matchMedia can lag the viewport meta)
    const mq = window.matchMedia('(max-width: 560px)');
    mq.addEventListener ? mq.addEventListener('change', on) : mq.addListener(on);
    window.addEventListener('resize', on);
    window.addEventListener('orientationchange', on);
    window.addEventListener('load', on);
    return () => {
      mq.removeEventListener ? mq.removeEventListener('change', on) : mq.removeListener(on);
      window.removeEventListener('resize', on);
      window.removeEventListener('orientationchange', on);
      window.removeEventListener('load', on);
    };
  }, []);
  return phone;
}

// full-bleed on phones, iOS device mockup on desktop
function Shell({ phone, dark, children }) {
  return phone ? children : <IOSDevice dark={dark}>{children}</IOSDevice>;
}

window.OwndApp2 = function OwndApp2() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const isPhone = useIsPhone();
  const palette = useMemo(() => makePalette(tw.accent, tw.night), [tw.accent, tw.night]);
  const saved = useMemo(load, []);
  useEffect(() => { if (window.SFX) window.SFX.enabled = tw.sound !== false; }, [tw.sound]);

  // flow: splash → rules → (match → duel → reward → board) ×3 → champion → league hub ⇄ ranked (match → duel → swap)
  const resume = saved ? (saved.phase === 'duel' ? 'match' : (saved.phase === 'rduel' || saved.phase === 'rmatch' || saved.phase === 'swap') ? 'league' : saved.phase) : 'splash';
  const [phase, setPhase] = useState(resume);
  const [lvl, setLvl] = useState(saved ? (saved.lvl || 1) : 1);
  const [trophies, setTrophies] = useState(saved ? saved.trophies : ONB.start);
  const [wins, setWins] = useState(saved ? saved.wins : 0);
  const [deckProps, setDeckProps] = useState(saved && saved.deckProps ? saved.deckProps : STARTER_PROPS);
  const [settings, setSettings] = useState(getOwndSettings2);
  const updateSettings = (next) => { setSettings(next); try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(next)); } catch (e) {} };
  const [reward, setReward] = useState(null);
  const [leagueIdx, setLeagueIdx] = useState(saved ? (saved.leagueIdx || 0) : 0);
  const [lgPoints, setLgPoints] = useState(saved ? (saved.lgPoints || 0) : 0);
  const [lgW, setLgW] = useState(saved ? (saved.lgW || 0) : 0);
  const [lgL, setLgL] = useState(saved ? (saved.lgL || 0) : 0);
  const [rankedFoe, setRankedFoe] = useState(null);
  const [swapCard, setSwapCard] = useState(null);
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast({ m: msg, k: Date.now() });
  useEffect(() => { if (!toast) return; const id = setTimeout(() => setToast(null), 2600); return () => clearTimeout(id); }, [toast]);

  useEffect(() => { localStorage.setItem(SAVE, JSON.stringify({ phase, lvl, trophies, wins, deckProps, leagueIdx, lgPoints, lgW, lgL })); }, [phase, lvl, trophies, wins, deckProps, leagueIdx, lgPoints, lgW, lgL]);

  const m = ONB.matches[Math.min(lvl - 1, ONB.matches.length - 1)];
  const deckActions = useMemo(() => actionsForWins(settings, wins), [settings, wins]);
  const playerSpec = useMemo(() => ({ props: deckProps, actions: deckActions, cash: CASH_SPEC }), [deckProps, deckActions]);
  const onbDuelMatch = { ...m, ...ONB_FOE[Math.min(lvl - 1, ONB_FOE.length - 1)] };

  /* ── onboarding (rigged): each win drops ONE new higher-value card + unlocks an action ──
     (early wins reward a single card, not a whole colour set at once) */
  function endOnbDuel() {
    const rw = LEVEL_REWARDS[lvl - 1];
    // pick the weakest card of the reward colour and upgrade just that one
    let targetIdx = -1, lowest = Infinity;
    deckProps.forEach((p, i) => { if (p.type === rw.type && p.m < rw.m && p.m < lowest) { lowest = p.m; targetIdx = i; } });
    if (targetIdx < 0) targetIdx = deckProps.findIndex(p => p.type === rw.type); // fallback: already all upgraded
    const prevM = targetIdx >= 0 ? deckProps[targetIdx].m : 1;
    let card = null;
    const newProps = deckProps.map((p, i) => { if (i === targetIdx) { card = { ...p, m: rw.m }; return card; } return p; });
    setDeckProps(newProps);
    const addedKinds = actionBuckets(settings)[lvl - 1] || [];
    setReward({ ...rw, card, prevM, setCards: newProps.filter(p => p.type === rw.type), actionsAdded: addedKinds.map(k => ({ k, count: settings.actions[k] || 0 })) });
    setTrophies(v => v + m.reward); setWins(w => w + 1);
    setPhase('reward');
  }
  function boardNext() { if (lvl < 3) { setLvl(l => l + 1); setPhase('match'); } else setPhase('champion'); }
  function champDone() { setLeagueIdx(1); setLgPoints(0); setLgW(0); setLgL(0); setPhase('league'); showToast('Promoted to Silver League — ranked play begins!'); }

  /* ── ranked (real matches): win → +pts + card-swap reward · lose → −pts ── */
  function playRanked() {
    const foe = rnd(RANKED_FOES);
    const advanced = ['takeover', 'legal', 'flip'].filter(k => (settings.actions[k] || 0) > 0);
    setRankedFoe({ name: foe.name, color: foe.color, foeM: 1 + leagueIdx, foeActions: ['capital', 'capital', 'destroy', 'steal', 'heist', 'draw2', ...advanced], reward: 30, rounds: 6 });
    setPhase('rmatch');
  }
  function endRanked(win) {
    if (win) {
      setLgW(w => w + 1); setTrophies(v => v + 30);
      const type = rnd(T3), mm = 1 + Math.floor(Math.random() * 5);
      setSwapCard({ id: 'rw_' + Date.now(), type, place: GLYPH[type], m: mm, name: rnd(REWARD_NAMES[type]) });
      setPhase('swap');
    } else {
      setLgL(l => l + 1); setLgPoints(p => Math.max(0, p - 15));
      setPhase('league'); showToast('Defeated — −15 league points');
    }
  }
  function finishWin() {
    setSwapCard(null);
    const np = lgPoints + 30;
    if (np >= PROMOTE_AT && leagueIdx < LEAGUES2.length - 1) {
      const ni = leagueIdx + 1;
      setLeagueIdx(ni); setLgPoints(0); setLgW(0); setLgL(0);
      showToast('Promoted to ' + LEAGUES2[ni].name + ' League!');
    } else { setLgPoints(np); showToast('Ranked win — +30 points'); }
    setPhase('league');
  }
  function applySwap(index) { setDeckProps(props => props.map((p, i) => i === index ? { ...swapCard, id: p.id } : p)); finishWin(); }

  return (
    <ThemeCtx.Provider value={palette}>
      <Shell phone={isPhone} dark={palette.dark}>
        <div style={{ position: 'relative', width: '100%', height: '100%', overflow: 'hidden', background: palette.surface2, color: palette.ink }}>
          {phase === 'splash' && <Splash onStart={() => setPhase('intro')} />}
          {phase === 'intro' && <NarrativeIntro onDone={() => setPhase('rules')} />}
          {phase === 'rules' && <RulesIntro onDone={() => setPhase('match')} />}
          {phase === 'match' && <MatchScreen key={'m' + lvl} lvl={lvl} match={m} trophies={trophies} onFight={() => setPhase('duel')} />}
          {phase === 'duel' && <DealGame key={'d' + lvl} match={onbDuelMatch} youDeck={playerSpec} timerOn={m.tut ? false : tw.pvpTimer} onEnd={endOnbDuel} onExit={() => setPhase('match')} />}
          {phase === 'reward' && reward && <RewardScreen key={'r' + lvl} lvl={lvl} match={m} reward={reward} onNext={() => setPhase('board')} />}
          {phase === 'board' && <BoardScreen key={'b' + lvl} lvl={lvl} oldT={trophies - m.reward} newT={trophies} onNext={boardNext} />}
          {phase === 'champion' && <ChampionScreen onDone={champDone} />}
          {phase === 'league' && <LeagueHub league={LEAGUES2[leagueIdx]} points={lgPoints} promoteAt={PROMOTE_AT} record={{ w: lgW, l: lgL }} deck={deckProps} onPlay={playRanked} />}
          {phase === 'rmatch' && rankedFoe && <RankedIntro league={LEAGUES2[leagueIdx]} foe={rankedFoe} onFight={() => setPhase('rduel')} onBack={() => setPhase('league')} />}
          {phase === 'rduel' && rankedFoe && <DealGame key={'rd' + lgW + '_' + lgL} match={rankedFoe} youDeck={playerSpec} timerOn={tw.pvpTimer} onEnd={endRanked} onExit={() => setPhase('league')} />}
          {phase === 'swap' && swapCard && <SwapReward card={swapCard} deck={deckProps} onSwap={applySwap} onKeep={finishWin} />}
          {toast && <Toast msg={toast.m} key={toast.k} />}
          <TechControls settings={settings} onChange={updateSettings} />
        </div>
      </Shell>

      <TweaksPanel>
        <TweakSection label="PvP" />
        <TweakToggle label="Sound effects" value={tw.sound !== false} onChange={v => setTweak('sound', v)} />
        <TweakToggle label="Turn timer" value={tw.pvpTimer} onChange={v => setTweak('pvpTimer', v)} />
        <TweakSection label="Look" />
        <TweakColor label="Accent" value={tw.accent} options={ACCENTS} onChange={v => setTweak('accent', v)} />
        <TweakToggle label="Night mode" value={tw.night} onChange={v => setTweak('night', v)} />
        <TweakSection label="Demo" />
        <TweakButton label="Restart from the beginning" onClick={() => { localStorage.removeItem(SAVE); location.reload(); }} />
      </TweaksPanel>
    </ThemeCtx.Provider>
  );
};

/* ───────────── SPLASH / PERMISSION / TOAST ───────────── */
function Wordmark({ size = 60 }) {
  const t = useT();
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
      <div style={{ width: size * 0.9, height: size * 0.9, borderRadius: size * 0.26, background: t.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 8px 0 0 ${shade(t.accent, -0.2)}`, transform: 'rotate(-6deg)' }}>
        <Icon type="crown" size={size * 0.52} color="#fff" stroke={2.2} />
      </div>
      <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: size, color: t.ink, letterSpacing: -1 }}>OWND</span>
    </div>
  );
}
function MiniMapBack() {
  const t = useT();
  return (
    <div style={{ position: 'absolute', inset: 0, opacity: t.dark ? 0.5 : 0.7 }}>
      <div style={{ position: 'absolute', left: '52%', top: '8%', width: '30%', height: '20%', background: t.park, borderRadius: '46% 54% 50% 48%' }} />
      <div style={{ position: 'absolute', left: '-10%', bottom: '-6%', width: '50%', height: '30%', background: t.water, borderRadius: '50% 46% 42% 50%' }} />
      {[18, 70].map((tp, i) => <div key={i} style={{ position: 'absolute', left: '-4%', width: '108%', top: tp + '%', height: 30, background: t.road }} />)}
      {[28, 66].map((lf, i) => <div key={i} style={{ position: 'absolute', top: '-4%', height: '108%', left: lf + '%', width: 26, background: t.road }} />)}
    </div>
  );
}
function Splash({ onStart }) {
  const t = useT();
  return (
    <div data-screen-label="Splash" style={{ position: 'absolute', inset: 0, background: t.mapBg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 30, textAlign: 'center', overflow: 'hidden' }}>
      <MiniMapBack />
      <div style={{ position: 'relative', zIndex: 2, animation: 'ownd-pop .6s ease' }}>
        <Wordmark size={62} />
        <p style={{ fontFamily: 'Fredoka', fontWeight: 500, fontSize: 21, color: t.ink, margin: '22px 0 4px', lineHeight: 1.25 }}>Collect real places.<br />Duel your way to the top.</p>
        <p style={{ fontSize: 15, color: t.sub, fontWeight: 600, margin: '0 0 32px', maxWidth: 300 }}>Card duels for real-world places. Learn the game, climb the league, win the cup — then own the map.</p>
        <Btn onClick={onStart} style={{ minWidth: 220 }}>Play OWND</Btn>
      </div>
    </div>
  );
}
function Permission({ onAllow }) {
  const t = useT();
  return (
    <div data-screen-label="Location permission" style={{ position: 'absolute', inset: 0, background: t.mapBg, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
      <MiniMapBack />
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(10,16,28,.35)' }} />
      <div style={{ position: 'relative', zIndex: 2, background: t.surface, borderRadius: '26px 26px 0 0', width: '100%', padding: '30px 26px 46px', boxShadow: '0 -20px 50px rgba(0,0,0,.25)', animation: 'ownd-sheetup .4s ease' }}>
        <div style={{ width: 76, height: 76, borderRadius: 24, background: t.accent + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 18px' }}>
          <Icon type="pin" size={38} color={t.accent} stroke={2.4} />
        </div>
        <h2 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 25, color: t.ink, textAlign: 'center', margin: '0 0 8px' }}>Turn on location</h2>
        <p style={{ fontSize: 15.5, color: t.sub, fontWeight: 600, textAlign: 'center', margin: '0 0 26px', lineHeight: 1.4 }}>OWND finds the real places around you so you can scout them into cards. Used only while you play.</p>
        <Btn full onClick={onAllow}>Allow while using OWND</Btn>
        <button onClick={onAllow} style={{ display: 'block', margin: '14px auto 0', color: t.sub, fontFamily: 'Fredoka', fontWeight: 600, fontSize: 15.5 }}>Not now</button>
      </div>
    </div>
  );
}
/* technical top-right cluster: match options + restart */
function TechControls({ settings, onChange }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position: 'absolute', top: 8, right: 8, zIndex: 300, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
      <div style={{ display: 'flex', gap: 6 }}>
        <button onClick={() => setOpen(o => !o)} title="Match options" style={{ width: 30, height: 30, borderRadius: 9, flexShrink: 0, background: open ? '#f5c84b' : 'rgba(10,16,28,.5)', border: open ? '1px solid #f5c84b' : '1px solid rgba(255,255,255,.28)', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(4px)', WebkitBackdropFilter: 'blur(4px)' }}>
          <Icon type="sliders" size={16} color={open ? '#1a2233' : 'rgba(255,255,255,.92)'} stroke={2.3} />
        </button>
        <RestartButton />
      </div>
      {open && <OptionsPanel settings={settings} onChange={onChange} onClose={() => setOpen(false)} />}
    </div>
  );
}
function StepBtn({ label, dis, onClick }) {
  return <button onClick={dis ? undefined : onClick} style={{ width: 24, height: 24, borderRadius: 7, background: dis ? 'rgba(255,255,255,.08)' : 'rgba(255,255,255,.16)', color: dis ? 'rgba(255,255,255,.3)' : '#fff', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15, display: 'flex', alignItems: 'center', justifyContent: 'center', lineHeight: 1 }}>{label}</button>;
}
function Stepper({ value, min, max, on }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
      <StepBtn label="−" dis={value <= min} onClick={() => on(value - 1)} />
      <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 14, color: '#fff', width: 16, textAlign: 'center' }}>{value}</span>
      <StepBtn label="+" dis={value >= max} onClick={() => on(value + 1)} />
    </div>
  );
}
const PANEL_AGGRO = { destroy: 1, steal: 1, heist: 1, confiscate: 1, takeover: 1 };
function OptionsPanel({ settings, onChange, onClose }) {
  const defs = window.ACTION_DEFS || {}, icons = window.ACT_ICON || {};
  const buckets = actionBuckets(settings);
  const bucketOf = (k) => { for (let i = 0; i < 3; i++) if (buckets[i].indexOf(k) >= 0) return i; return -1; };
  const setCount = (k, v) => onChange({ ...settings, actions: { ...settings.actions, [k]: v } });
  const numRow = (label, sub, node) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '8px 0' }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: '#fff' }}>{label}</div>
        <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,.55)' }}>{sub}</div>
      </div>
      {node}
    </div>
  );
  return (
    <div className="ownd-scroll" style={{ width: 338, maxHeight: 640, overflowY: 'auto', background: 'rgba(10,16,28,.94)', border: '1px solid rgba(255,255,255,.16)', borderRadius: 16, padding: '12px 14px', boxShadow: '0 18px 44px rgba(0,0,0,.55)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', animation: 'ownd-pop .18s ease' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
        <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15, color: '#fff', flex: 1 }}>Match options</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: 'rgba(255,255,255,.45)' }}>applies from the next duel</span>
        <button onClick={onClose} style={{ width: 24, height: 24, borderRadius: 999, background: 'rgba(255,255,255,.12)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon type="close" size={13} color="#fff" stroke={2.4} /></button>
      </div>
      {numRow('Starting hand', 'cards dealt at the start', <Stepper value={settings.startHand} min={1} max={6} on={v => onChange({ ...settings, startHand: v })} />)}
      {numRow('Draw per turn', 'cards drawn when a turn begins', <Stepper value={settings.draw} min={1} max={5} on={v => onChange({ ...settings, draw: v })} />)}
      <div style={{ margin: '8px 0 2px' }}>
        <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 11, letterSpacing: 1.2, color: '#f5c84b' }}>ACTION CARDS IN PLAY</div>
        <div style={{ fontSize: 10.5, fontWeight: 700, color: 'rgba(255,255,255,.5)' }}>copies in your deck · unlocked gradually over wins 1–3</div>
      </div>
      {ACTION_META.map(mt => {
        const d = defs[mt.k] || { name: mt.k, desc: '' };
        const c = settings.actions[mt.k] || 0;
        const b = bucketOf(mt.k);
        const tag = c === 0 ? 'off' : mt.starter ? 'game 1' : b >= 0 ? 'win ' + (b + 1) : 'off';
        return (
          <div key={mt.k} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '7px 0', borderTop: '1px solid rgba(255,255,255,.08)', opacity: c > 0 ? 1 : .55 }}>
            <span style={{ width: 28, height: 28, borderRadius: 8, flexShrink: 0, background: PANEL_AGGRO[mt.k] ? '#b3312e' : '#1f7a45', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon type={icons[mt.k] || 'flame'} size={15} color="#fff" stroke={2.2} /></span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12.5, color: '#fff', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.name}</span>
                <span style={{ flexShrink: 0, fontFamily: 'Fredoka', fontWeight: 700, fontSize: 8.5, letterSpacing: .5, color: c > 0 ? '#1a2233' : 'rgba(255,255,255,.6)', background: c > 0 ? '#f5c84b' : 'rgba(255,255,255,.12)', borderRadius: 999, padding: '1px 7px', textTransform: 'uppercase' }}>{tag}</span>
              </div>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'rgba(255,255,255,.55)', lineHeight: 1.25, marginTop: 1 }}>{d.desc}</div>
            </div>
            <Stepper value={c} min={0} max={3} on={v => setCount(mt.k, v)} />
          </div>
        );
      })}
      <div style={{ display: 'flex', justifyContent: 'flex-end', paddingTop: 10, borderTop: '1px solid rgba(255,255,255,.08)', marginTop: 2 }}>
        <button onClick={() => onChange(JSON.parse(JSON.stringify(SETTINGS_DEFAULT)))} style={{ background: 'rgba(255,255,255,.14)', color: '#fff', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12, padding: '7px 14px', borderRadius: 999 }}>Reset to defaults</button>
      </div>
    </div>
  );
}
/* small technical control: wipe saved progress + reload, with a quick confirm */
function RestartButton() {
  const t = useT();
  const [confirm, setConfirm] = useState(false);
  useEffect(() => { if (!confirm) return; const id = setTimeout(() => setConfirm(false), 4000); return () => clearTimeout(id); }, [confirm]);
  const doRestart = () => { try { localStorage.removeItem(SAVE); } catch (e) {} location.reload(); };
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      {confirm && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, background: 'rgba(10,16,28,.85)', borderRadius: 999, padding: '4px 4px 4px 12px', boxShadow: '0 6px 18px rgba(0,0,0,.45)', animation: 'ownd-pop .16s ease' }}>
          <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12, color: '#fff', whiteSpace: 'nowrap' }}>Restart demo?</span>
          <button onClick={doRestart} style={{ background: '#e0524f', color: '#fff', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12, padding: '5px 11px', borderRadius: 999 }}>Yes</button>
          <button onClick={() => setConfirm(false)} style={{ background: 'rgba(255,255,255,.16)', color: '#fff', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12, padding: '5px 11px', borderRadius: 999 }}>No</button>
        </div>
      )}
      <button onClick={() => setConfirm(c => !c)} title="Restart prototype from the beginning" style={{ width: 30, height: 30, borderRadius: 9, flexShrink: 0, background: 'rgba(10,16,28,.5)', border: '1px solid rgba(255,255,255,.28)', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(4px)', WebkitBackdropFilter: 'blur(4px)' }}>
        <Icon type="reload" size={16} color="rgba(255,255,255,.92)" stroke={2.3} />
      </button>
    </div>
  );
}
function Toast({ msg }) {
  const t = useT();
  return (
    <div style={{ position: 'absolute', left: 16, right: 16, bottom: 104, zIndex: 95, display: 'flex', justifyContent: 'center', pointerEvents: 'none' }}>
      <div style={{ background: t.ink, color: t.dark ? '#0f1626' : '#fff', fontFamily: 'Fredoka', fontWeight: 600, fontSize: 15, padding: '13px 20px', borderRadius: 16, boxShadow: '0 12px 30px rgba(0,0,0,.35)', animation: 'ownd-toast 2.6s ease forwards', textAlign: 'center', maxWidth: 330 }}>{msg}</div>
    </div>
  );
}

</script>

  <script type="text/babel" data-presets="react">
    // phone = fill the whole screen (real phone, or a narrow window). desktop = show the device mockup.
    // ?phone in the URL forces full-bleed so it can be previewed on a big screen too.
    window.owndPhoneMode = function () {
      return window.matchMedia('(max-width: 560px)').matches || /[?&]phone/.test(location.search);
    };
    function fitStage() {
      const stage = document.getElementById('stage');
      if (!stage) return;
      const W = 402, H = 874, pad = 24;
      if (window.innerWidth < 2 || window.innerHeight < 2) return;
      const b = document.body.style;
      if (window.owndPhoneMode()) {
        // full-bleed: keep the proven 402×874 canvas, scale it to fill the phone (no bezel, no cap).
        // Portrait phones share this ~0.46 aspect so letterboxing is minimal; odd sizes letterbox
        // gracefully instead of overlapping the fixed layout.
        stage.style.transformOrigin = 'center center';
        stage.style.width = W + 'px';
        stage.style.height = H + 'px';
        const s = Math.max(0.05, Math.min(window.innerWidth / W, window.innerHeight / H));
        stage.style.transform = `scale(${s})`;
        b.alignItems = 'center'; b.justifyContent = 'center';
        b.background = '#0f1626'; b.backgroundImage = 'none';
      } else {
        // desktop: centred device mockup, scaled to fit the window
        stage.style.transformOrigin = 'center center';
        stage.style.width = ''; stage.style.height = '';
        const s = Math.max(0.05, Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1.15));
        stage.style.transform = `scale(${s})`;
        b.alignItems = 'center'; b.justifyContent = 'center';
        b.background = '#c9d2e0'; b.backgroundImage = 'radial-gradient(circle at 30% 20%, #d5dcea, #b8c2d4 70%)';
      }
    }
    window.addEventListener('resize', fitStage);
    window.addEventListener('orientationchange', fitStage);
    window.addEventListener('load', fitStage);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', fitStage);
    requestAnimationFrame(fitStage);
    if (window.ResizeObserver) new ResizeObserver(fitStage).observe(document.documentElement);
    fitStage();
    ReactDOM.createRoot(document.getElementById('stage')).render(<window.OwndApp2 />);
  </script>
