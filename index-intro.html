  <script type="text/babel">
// OWND PvP — "Race for Sets and Capital" (Monopoly-Deal style). Engine + felt-table UI.
const { useState, useEffect, useRef, useMemo } = React;
const { useT, TYPES, RARITY, PLACES, shade, Icon, Btn, CardFace, Confetti } = window;

/* ═══════════ RULES ═══════════ */
const SET_SIZE = 3, MAX_ROUNDS = 6, PLAYS = 3, HAND_LIMIT = 8, DRAW = 3, START_HAND = 3, TURN_SECS = 30;
const TYPE_KEYS = ['heritage', 'nature', 'social'];

let _uid = 0; const uid = () => 'c' + (++_uid);
const PLACE_GLYPH = { heritage: 'landmark', nature: 'park', social: 'cafe' };
// compact label for cards placed on the board so the whole table fits the phone width
const SHORT_STOP = { st: 1, 'st.': 1, the: 1, mt: 1, 'mt.': 1, old: 1, san: 1, le: 1, la: 1, el: 1, of: 1 };
function shortName(n) {
  const words = (n || '').replace(/[',]/g, '').split(/\s+/).filter(Boolean);
  let w = words[0] || '';
  if (SHORT_STOP[w.toLowerCase()] && words[1]) w = words[1];
  return w.length > 10 ? w.slice(0, 10) : w;
}
const ACTION_DEFS = {
  capital: { name: 'Own Capital', desc: '+3M to your Bank.' },
  draw2: { name: 'Market Tip', desc: 'Draw 2 extra cards.' },
  shield: { name: 'Deed Lock', desc: 'Block the next attack against you this round.' },
  destroy: { name: 'Destroy Title', desc: "Remove a property from a rival's unfinished set." },
  steal: { name: 'Steal Card', desc: "Take a random card from the rival's hand." },
  heist: { name: 'Heist', desc: "Rob a random cash card from the rival's Bank into yours." },
  confiscate: { name: 'Confiscate', desc: "Rival loses a random cash card from their Bank." },
  takeover: { name: 'Hostile Takeover', desc: "Seize a card from the rival's unfinished set into yours. Costs 2 plays.", cost: 2 },
  legal: { name: 'Legal Clause', desc: 'Lies face-down — auto-cancels the next action played against you.' },
  flip: { name: 'Flip', desc: 'Sell your loneliest placed property back for ×1.5 cash.' },
};
function setValue(cards) { return cards.reduce((s, c) => s + (c.m || 0), 0); }
// a completed set's multiplier scales with its total M value — bigger cards make a bigger ×
function setMultiplier(cards) { if (cards.length < SET_SIZE) return 0; return 1 + setValue(cards) / 10; }
// base ×1, then MULTIPLY by each completed set's multiplier (compounding, not adding)
function sumMult(sets) { return TYPE_KEYS.reduce((p, k) => { const m = setMultiplier(sets[k]); return m > 0 ? p * m : p; }, 1); }
function completeCount(sets) { return TYPE_KEYS.filter(k => sets[k].length >= SET_SIZE).length; }
function bankTotal(b) { return Array.isArray(b) ? b.reduce((s, c) => s + (c.m || 0), 0) : (b || 0); }
function victoryValue(bank, sets) { return bankTotal(bank) * sumMult(sets); }

function propToCard(p) { return { k: 'prop', uid: uid(), id: p.id, name: p.name, type: p.type, place: p.place || PLACE_GLYPH[p.type] || 'landmark', m: p.m || 1 }; }
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

// build a deck from an explicit spec: { props:[{id,name,type,place,m}], actions:[key...], cash:[m...] }
function buildDeck(spec) {
  spec = spec || {};
  const propCards = (spec.props || []).map(propToCard);
  const cashCards = (spec.cash || [1, 1, 2, 2, 3, 3]).map(m => ({ k: 'cash', uid: uid(), m }));
  const acts = (spec.actions || []).map(a => ({ k: 'action', uid: uid(), act: a, name: (ACTION_DEFS[a] || {}).name || a, desc: (ACTION_DEFS[a] || {}).desc || '' }));
  return shuffle([...propCards, ...cashCards, ...acts]);
}

// foe deck derived from a match (scaled M + limited actions per opponent)
function specForFoe(match) {
  const props = [];
  TYPE_KEYS.forEach(ty => {
    const all = PLACES.filter(p => p.type === ty);
    for (let i = 0; i < 3; i++) { const p = all[i % all.length] || {}; props.push({ id: 'f_' + ty + i, name: p.name || ty, type: ty, place: p.place, m: match.foeM || 1 }); }
  });
  const cfgA = ((typeof window.getOwndSettings2 === 'function' ? window.getOwndSettings2() : {}) || {}).actions || {};
  const foeActs = (match.foeActions || ['capital', 'capital', 'destroy', 'steal', 'heist', 'draw2']).filter(a => cfgA[a] === undefined || cfgA[a] > 0);
  return { props, actions: foeActs, cash: [1, 1, 2, 2, 3, 3] };
}

const emptySets = () => ({ heritage: [], nature: [], social: [] });

function initState(youPool, foePool, timerOn, opts = {}) {
  const cfg = (typeof window.getOwndSettings2 === 'function' ? window.getOwndSettings2() : {}) || {};
  const SH = Math.max(1, opts.startHand || cfg.startHand || START_HAND);
  const DR = Math.max(1, opts.draw || cfg.draw || DRAW);
  const dyou0 = buildDeck(youPool), dfoe = buildDeck(foePool);
  let dyou, hy, tutType = null, tutTargets = null;
  if (opts.tutorial) {
    // deal so the player can build TWO full sets and end the duel by the 2-set rule
    const byType = {};
    dyou0.forEach(c => { if (c.k === 'prop') (byType[c.type] = byType[c.type] || []).push(c); });
    const full = TYPE_KEYS.filter(k => (byType[k] || []).length >= 3);
    const tA = full[0] || TYPE_KEYS.find(k => byType[k]) || 'heritage';
    const tB = full.find(k => k !== tA) || TYPE_KEYS.find(k => k !== tA && (byType[k] || []).length);
    tutType = tA;
    const aCards = byType[tA] || [];
    const bCards = (tB && byType[tB]) || [];
    const cash = dyou0.find(c => c.k === 'cash' && c.m >= 2) || dyou0.find(c => c.k === 'cash');
    // opening hand: two of set A + a cash card (guided: invest A, bank cash, invest A)
    hy = [aCards[0], cash, aCards[1]].filter(Boolean);
    tutTargets = { prop: aCards[0] && aCards[0].uid, cash: cash && cash.uid };
    // pace the draw pile so set A completes early but set B's final card only arrives on round 4.
    // draws come 3 at a time (turns 2,3,4): [A3, filler, filler] · [B1, B2, filler] · [B3, filler, filler]
    const reserved = new Set([...hy, aCards[2], bCards[0], bCards[1], bCards[2]].filter(Boolean).map(c => c.uid));
    const rest = dyou0.filter(c => !reserved.has(c.uid));
    const fillers = rest.filter(c => c.k !== 'prop');   // cash + action cards
    const deepProps = rest.filter(c => c.k === 'prop');  // leftover props pushed deep so they can't rush a set
    const take = (n) => fillers.splice(0, n);
    dyou = [
      aCards[2], ...take(2),
      bCards[0], bCards[1], ...take(1),
      bCards[2], ...take(2),
      ...fillers, ...deepProps,
    ].filter(Boolean);
    // honour a bigger configured starting hand (tutorial keeps its 3 scripted cards as a minimum)
    while (hy.length < SH && dyou.length > 3) {
      const gi = dyou.findIndex((c, i) => i >= 3 && c.k !== 'prop'); // don't disturb the paced early draws
      hy.push(gi >= 0 ? dyou.splice(gi, 1)[0] : dyou.pop());
    }
  } else {
    hy = dyou0.slice(0, SH);
    dyou = dyou0.slice(SH);
  }
  const hf = dfoe.slice(0, SH);
  return {
    deck: { you: dyou, foe: dfoe.slice(SH) },
    hand: { you: hy, foe: hf },
    bank: { you: [], foe: [{ k: 'cash', uid: uid(), m: 1 }] }, // P2 (foe, second) +1M
    sets: { you: emptySets(), foe: emptySets() },
    turns: { you: 0, foe: 0 },
    turn: 'you', plays: PLAYS, round: 1, phase: 'intro', winner: null,
    maxRounds: opts.rounds || MAX_ROUNDS, rig: !!opts.rig, bot: opts.bot || 0,
    instantFromRound: 1, // two completed sets end ANY duel instantly — the first (guided) match included
    startHand: SH, draw: DR,
    shield: { you: false, foe: false },
    legal: { you: 0, foe: 0 },
    tut: opts.tutorial ? 0 : null, tutType, tutTargets,
    log: [{ t: 'Match start — you go first.' }], fx: null, timerOn, timer: TURN_SECS,
  };
}

/* draw n into side hand */
function drawInto(s, side, n) {
  for (let i = 0; i < n; i++) { const c = s.deck[side].shift(); if (c) s.hand[side].push({ ...c, uid: uid() }); }
}

/* resolve one card action (invest|bank|use) */
function resolve(state, side, action) {
  const s = JSON.parse(JSON.stringify(state));
  const other = side === 'you' ? 'foe' : 'you';
  const hand = s.hand[side];
  const idx = hand.findIndex(c => c.uid === action.uid);
  if (idx < 0) return { state: s, note: null };
  const card = hand[idx];
  let note = null;
  const who = side === 'you' ? 'You' : s.foeName || 'Rival';

  if (action.t === 'invest' && card.k === 'prop') {
    if (s.sets[side][card.type].length >= SET_SIZE) return { state: s, note: 'That set is already complete' };
    hand.splice(idx, 1); s.sets[side][card.type].push(card);
    note = `${who} invested ${card.name} into ${TYPES[card.type].label}.`;
    s.fx = { side, kind: 'invest', type: card.type };
  } else if (action.t === 'bank') {
    hand.splice(idx, 1);
    const add = card.m || 0;
    s.bank[side].push(card);
    note = `${who} banked ${card.k === 'cash' ? card.m + 'M cash' : card.name} (+${add}M).`;
    s.fx = { side, kind: 'bank' };
  } else if (action.t === 'use' && card.k === 'action') {
    if (card.act === 'takeover' && s.plays < 2) { s.log.unshift({ t: 'Hostile Takeover costs 2 plays — not enough left this turn.' }); return { state: s, note: null }; }
    hand.splice(idx, 1);
    const act = card.act;
    const AGGRO = { destroy: 1, steal: 1, heist: 1, confiscate: 1, takeover: 1 };
    const theirs = other === 'you' ? 'your' : "the rival's";
    const cashIdxs = (arr) => arr.map((c, i) => c.k === 'cash' ? i : -1).filter(i => i >= 0);
    if (AGGRO[act] && s.legal && s.legal[other] > 0) {
      s.legal[other] -= 1;
      note = `${who} played ${card.name} — auto-cancelled by ${other === 'you' ? 'your' : "the rival's"} face-down Legal Clause!`;
      s.fx = { side: other, kind: 'shield' };
    } else if (AGGRO[act] && s.shield && s.shield[other]) {
      s.shield[other] = false;
      note = `${who} played ${card.name} — blocked by ${other === 'you' ? 'your' : "the rival's"} Deed Lock!`;
      s.fx = { side: other, kind: 'shield' };
    } else if (act === 'capital') { s.bank[side].push({ k: 'cash', uid: uid(), m: 3 }); note = `${who} played Own Capital (+3M).`; s.fx = { side, kind: 'bank' }; }
    else if (act === 'steal') {
      const oh = s.hand[other];
      if (oh.length) { const j = Math.floor(Math.random() * oh.length); const st = oh.splice(j, 1)[0]; hand.push(st); note = `${who} stole a card from ${other === 'you' ? 'you' : 'the rival'}.`; s.fx = { side, kind: 'steal', card: st, to: side, from: other }; }
      else { note = `${who} played Steal — nothing to take.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'heist') {
      const ob = s.bank[other]; const idxs = cashIdxs(ob);
      if (idxs.length) { const j = idxs[Math.floor(Math.random() * idxs.length)]; const rob = ob.splice(j, 1)[0]; s.bank[side].push(rob); note = `${who} robbed ${rob.m}M from ${theirs} Bank.`; s.fx = { side, kind: 'steal', card: rob, to: side, from: other }; }
      else { note = `${who} played Heist — no bank cash to rob.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'confiscate') {
      const ob = s.bank[other]; const idxs = cashIdxs(ob);
      if (idxs.length) { const j = idxs[Math.floor(Math.random() * idxs.length)]; const rem = ob.splice(j, 1)[0]; note = `${who} confiscated ${rem.m}M from ${theirs} Bank.`; s.fx = { side, kind: 'burn', card: rem, label: 'CONFISCATED', at: other }; }
      else { note = `${who} played Confiscate — no bank cash.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'destroy') {
      const os = s.sets[other];
      const cand = TYPE_KEYS.filter(k => os[k].length > 0 && os[k].length < SET_SIZE).sort((a, b) => os[b].length - os[a].length);
      if (cand.length) { const ty = cand[0]; const lost = os[ty].pop(); note = `${who} destroyed ${lost.name} in ${theirs} ${TYPES[ty].label} set.`; s.fx = { side, kind: 'burn', card: lost, label: 'DESTROYED', at: other }; }
      else { note = `${who} played Destroy Title — no incomplete set to hit.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'takeover') {
      const os = s.sets[other], ms = s.sets[side];
      const cand = TYPE_KEYS.filter(k => os[k].length > 0 && os[k].length < SET_SIZE && ms[k].length < SET_SIZE)
        .sort((a, b) => os[b].length - os[a].length);
      if (cand.length) {
        const ty = cand[0];
        let bi = 0; os[ty].forEach((c, i) => { if ((c.m || 0) > (os[ty][bi].m || 0)) bi = i; });
        const got = os[ty].splice(bi, 1)[0];
        ms[ty].push(got);
        s.plays -= 1; // heavy play — costs 2 in total
        note = `${who} pulled a Hostile Takeover — seized ${got.name} into ${side === 'you' ? 'your' : 'their'} ${TYPES[ty].label} set!`;
        s.fx = { side, kind: 'steal', card: got, to: side, from: other };
      } else { note = `${who} played Hostile Takeover — no raidable set.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'legal') {
      s.legal = s.legal || { you: 0, foe: 0 };
      s.legal[side] += 1;
      note = `${who} placed a face-down Legal Clause.`;
      s.fx = { side, kind: 'shield' };
    }
    else if (act === 'flip') {
      const ms = s.sets[side];
      const cand = TYPE_KEYS.filter(k => ms[k].length > 0 && ms[k].length < SET_SIZE).sort((a, b) => ms[a].length - ms[b].length);
      if (cand.length) {
        const ty = cand[0];
        let bi = 0; ms[ty].forEach((c, i) => { if ((c.m || 0) > (ms[ty][bi].m || 0)) bi = i; });
        const sold = ms[ty].splice(bi, 1)[0];
        const gain = Math.ceil((sold.m || 0) * 1.5);
        s.bank[side].push({ k: 'cash', uid: uid(), m: gain });
        note = `${who} flipped ${sold.name} for ${gain}M (×1.5).`;
        s.fx = { side, kind: 'bank' };
      } else { note = `${who} played Flip — no property in an unfinished set.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'renovate') {
      const mine = TYPE_KEYS.flatMap(k => s.sets[side][k]).filter(c => !c.hotel);
      if (mine.length) { mine.sort((a, b) => b.m - a.m); const tgt = mine[0]; tgt.houses = (tgt.houses || 0) + 1; note = `${who} renovated ${tgt.name} (+1 house).`; s.fx = { side, kind: 'invest', type: tgt.type }; }
      else { note = `${who} played Renovate — no property to upgrade.`; s.fx = { side, kind: 'sabotage' }; }
    }
    else if (act === 'shield') { if (s.shield) s.shield[side] = true; note = `${who} raised a Deed Lock.`; s.fx = { side, kind: 'shield' }; }
    else if (act === 'draw2') { drawInto(s, side, 2); note = `${who} played Market Tip — drew 2.`; s.fx = { side, kind: 'action' }; }
  } else {
    return { state: s, note: null };
  }
  s.plays -= 1;
  if (note) s.log.unshift({ t: note });
  // trigger check: completing a 2nd full set ends the duel instantly — in every match, the first included
  if (s.round >= (s.instantFromRound || 1) && completeCount(s.sets[side]) >= 2) { s.winner = decideWinner(s); s.phase = 'over'; s.endReason = who + ' completed a 2nd set!'; }
  return { state: s, note };
}

function decideWinner(s) {
  if (s.rig) {
    // onboarding matches are always winnable — quietly trim the rival's lead before scoring
    let guard = 24;
    while (guard-- > 0 && victoryValue(s.bank.foe, s.sets.foe) >= victoryValue(s.bank.you, s.sets.you)) {
      if (s.bank.foe.length) { let bi = 0; s.bank.foe.forEach((c, i) => { if ((c.m || 0) > (s.bank.foe[bi].m || 0)) bi = i; }); s.bank.foe.splice(bi, 1); }
      else { const k = TYPE_KEYS.find(x => s.sets.foe[x].length >= SET_SIZE); if (k) s.sets.foe[k].pop(); else break; }
    }
    return 'you';
  }
  const vy = victoryValue(s.bank.you, s.sets.you), vf = victoryValue(s.bank.foe, s.sets.foe);
  if (vy === vf) return bankTotal(s.bank.you) >= bankTotal(s.bank.foe) ? 'you' : 'foe';
  return vy > vf ? 'you' : 'foe';
}

function endTurn(state, side) {
  let s = JSON.parse(JSON.stringify(state));
  if (s.tut != null) s.tut = null; // tutorial ends with your first turn
  // discard down to HAND_LIMIT (drop lowest value)
  const val = (c) => c.k === 'cash' ? c.m : c.k === 'prop' ? c.m : 0.5;
  while (s.hand[side].length > HAND_LIMIT) {
    let lo = 0; for (let i = 1; i < s.hand[side].length; i++) if (val(s.hand[side][i]) < val(s.hand[side][lo])) lo = i;
    s.hand[side].splice(lo, 1);
  }
  s.turns[side] += 1;
  const other = side === 'you' ? 'foe' : 'you';
  if (side === 'foe') s.round = Math.min(s.maxRounds, s.round + 1);
  // end condition: both had maxRounds turns
  if (s.turns.you >= s.maxRounds && s.turns.foe >= s.maxRounds) {
    s.winner = decideWinner(s); s.phase = 'over'; s.endReason = 'Round limit reached'; return s;
  }
  // next turn
  s.turn = other; s.plays = PLAYS; s.timer = TURN_SECS;
  if (s.shield) s.shield[other] = false; // incoming player's protection window has closed
  const dr = s.draw || DRAW;
  drawInto(s, other, dr);
  s.log.unshift({ t: `${other === 'you' ? 'Your' : (s.foeName || 'Rival') + '’s'} turn — drew ${dr}.` });
  return s;
}

/* ═══════════ BOT AI ═══════════ */
/* handicapped bot for onboarding — stays alive-looking but never runs away with it */
function botMoveRigged(s) {
  const hand = s.hand.foe, sets = s.sets.foe;
  // invest, but never complete a 2nd set (that would end the match in its favour)
  const props = hand.filter(c => c.k === 'prop' && sets[c.type].length < SET_SIZE)
    .filter(c => !(sets[c.type].length === SET_SIZE - 1 && completeCount(sets) >= 1));
  if (props.length && Math.random() < 0.75) return { t: 'invest', uid: props[0].uid };
  if (s.bot >= 2) {
    const stz = hand.find(c => c.k === 'action' && c.act === 'steal');
    if (stz && s.hand.you.length > 2 && Math.random() < 0.35) return { t: 'use', uid: stz.uid };
  }
  const cash = hand.filter(c => c.k === 'cash' && c.m <= (s.bot >= 2 ? 3 : 2)).sort((a, b) => a.m - b.m)[0];
  if (cash) return { t: 'bank', uid: cash.uid };
  if (props.length) return { t: 'invest', uid: props[0].uid };
  return null;
}
function botMove(s) {
  if (s.bot) return botMoveRigged(s);
  const hand = s.hand.foe, sets = s.sets.foe, you = s.sets.you;
  // 1. complete a set
  for (const c of hand) if (c.k === 'prop' && sets[c.type].length === SET_SIZE - 1) return { t: 'invest', uid: c.uid };
  // 2. own capital
  const cap = hand.find(c => c.k === 'action' && c.act === 'capital'); if (cap) return { t: 'use', uid: cap.uid };
  // 3. destroy opponent near-complete set
  const dz = hand.find(c => c.k === 'action' && c.act === 'destroy');
  if (dz && TYPE_KEYS.some(k => you[k].length === SET_SIZE - 1)) return { t: 'use', uid: dz.uid };
  // 3b. hostile takeover — raid the player's most advanced unfinished set (needs 2 plays)
  const tk = hand.find(c => c.k === 'action' && c.act === 'takeover');
  if (tk && s.plays >= 2 && TYPE_KEYS.some(k => you[k].length > 0 && you[k].length < SET_SIZE && sets[k].length < SET_SIZE)) return { t: 'use', uid: tk.uid };
  // 4. invest a property toward the most-progressed non-full set
  const props = hand.filter(c => c.k === 'prop' && sets[c.type].length < SET_SIZE);
  if (props.length) {
    props.sort((a, b) => (sets[b.type].length - sets[a.type].length) || (b.m - a.m));
    // if its set already has 2 but bank is low, still invest; if all sets full for a type, bank
    return { t: 'invest', uid: props[0].uid };
  }
  // 4b. heist / confiscate the opponent's banked cash
  const hz = hand.find(c => c.k === 'action' && c.act === 'heist'); if (hz && s.bank.you.some(c => c.k === 'cash')) return { t: 'use', uid: hz.uid };
  const fz = hand.find(c => c.k === 'action' && c.act === 'confiscate'); if (fz && s.bank.you.some(c => c.k === 'cash')) return { t: 'use', uid: fz.uid };
  // 4b2. lay a face-down legal clause if none is active
  const lgc = hand.find(c => c.k === 'action' && c.act === 'legal');
  if (lgc && !((s.legal || {}).foe > 0)) return { t: 'use', uid: lgc.uid };
  // 4b3. flip a lonely property when cash-starved
  const flc = hand.find(c => c.k === 'action' && c.act === 'flip');
  if (flc && bankTotal(s.bank.foe) < 4 && TYPE_KEYS.some(k => sets[k].length === 1)) return { t: 'use', uid: flc.uid };
  // 4c. renovate a property already on the table
  const rz = hand.find(c => c.k === 'action' && c.act === 'renovate'); if (rz && TYPE_KEYS.some(k => sets[k].length > 0)) return { t: 'use', uid: rz.uid };
  // 4d. shield when a set is one card from complete
  const shz = hand.find(c => c.k === 'action' && c.act === 'shield'); if (shz && !s.shield.foe && TYPE_KEYS.some(k => sets[k].length === SET_SIZE - 1)) return { t: 'use', uid: shz.uid };
  // 5. bank a full-set property or cash
  const bankable = hand.find(c => c.k === 'cash') || hand.find(c => c.k === 'prop');
  if (bankable) return { t: 'bank', uid: bankable.uid };
  // 6. steal
  const stz = hand.find(c => c.k === 'action' && c.act === 'steal'); if (stz && s.hand.you.length) return { t: 'use', uid: stz.uid };
  const cz = hand.find(c => c.k === 'action' && c.act === 'confiscate'); if (cz) return { t: 'use', uid: cz.uid };
  const d2 = hand.find(c => c.k === 'action' && c.act === 'draw2'); if (d2) return { t: 'use', uid: d2.uid };
  return null;
}

Object.assign(window, { OwndDeal_helpers: { victoryValue, sumMult, setMultiplier, setValue, completeCount } });

/* ═══════════ UI ═══════════ */
const FELT = { top: '#2f7d55', bot: '#1f5f40', rail: '#c79a5b', rail2: '#a9783f' };
const RAIL = { light: '#e8d6a0', dark: '#d0b06e' };
const AGGRO_ACTS = { destroy: 1, steal: 1, heist: 1, confiscate: 1, takeover: 1 };
const ACT_ICON = { capital: 'coin', destroy: 'flame', steal: 'swords', heist: 'bolt', confiscate: 'close', renovate: 'landmark', shield: 'shield', draw2: 'plus', takeover: 'crown', legal: 'lock', flip: 'reload' };
const actBg = (act) => AGGRO_ACTS[act] ? 'linear-gradient(165deg,#e0605c,#b3302d)' : 'linear-gradient(165deg,#45b673,#1f7a45)';

function DealGame({ match, youDeck, timerOn = true, onEnd, onExit }) {
  const t = useT();
  const [s, setS] = useState(() => { const st = initState(youDeck, specForFoe(match), timerOn, { tutorial: !!match.tut, rig: !!match.rig, rounds: match.rounds, bot: match.bot }); st.foeName = match.name; return st; });
  const sRef = useRef(s); useEffect(() => { sRef.current = s; }, [s]);
  const [sel, setSel] = useState(null);   // selected hand uid (menu)
  const [ended, setEnded] = useState(false);
  const [finalBanner, setFinalBanner] = useState(false);
  const finalShownRef = useRef(false);

  useEffect(() => { const id = setTimeout(() => setS(x => ({ ...x, phase: 'play' })), 1600); return () => clearTimeout(id); }, []);

  // ── SOUND ──
  useEffect(() => { if (!s.fx) return; window.SFX && window.SFX.play(s.fx.kind); }, [s.fx]);
  const ccRef = useRef(0);
  useEffect(() => { const cc = completeCount(s.sets.you) + completeCount(s.sets.foe); if (cc > ccRef.current) window.SFX && window.SFX.play('setComplete'); ccRef.current = cc; }, [s.sets]);
  const turnRef = useRef('');
  useEffect(() => {
    const key = (s.phase === 'play' && s.turn === 'you' && !s.winner) ? 'you' : (s.turn + s.phase);
    if (key === 'you' && turnRef.current !== 'you') window.SFX && window.SFX.play('turn');
    turnRef.current = key;
  }, [s.turn, s.phase, s.winner]);
  useEffect(() => { if (s.winner && s.phase === 'over') window.SFX && window.SFX.play(s.winner === 'you' ? 'win' : 'lose'); }, [s.winner, s.phase]);
  // announce the final round once it begins
  useEffect(() => {
    if (s.phase === 'play' && !s.winner && s.round >= (s.maxRounds || MAX_ROUNDS) && !finalShownRef.current) {
      finalShownRef.current = true; setFinalBanner(true);
      window.SFX && window.SFX.play('turn');
      const id = setTimeout(() => setFinalBanner(false), 2200);
      return () => clearTimeout(id);
    }
  }, [s.round, s.phase, s.winner]);

  // fx clear (longer for burn/steal animations)
  useEffect(() => { if (!s.fx) return; const anim = s.fx.kind === 'burn' || s.fx.kind === 'steal'; const id = setTimeout(() => setS(x => ({ ...x, fx: null })), anim ? 1150 : 550); return () => clearTimeout(id); }, [s.fx]);

  function commitEnd() {
    window.SFX && window.SFX.play('end');
    const st = endTurn(sRef.current, 'you');
    setSel(null); setS(st);
  }
  function playCard(action) {
    const cur = sRef.current;
    if (cur.turn !== 'you' || cur.phase !== 'play' || cur.plays < 1) return;
    const { state, note } = resolve(cur, 'you', action);
    const spent = state.plays < cur.plays;
    if (spent && cur.tut === 1) state.tut = 2;
    else if (spent && cur.tut === 3) state.tut = 4;
    setSel(null); setS(state);
    if (state.phase === 'over') return;
    const anim = state.fx && (state.fx.kind === 'burn' || state.fx.kind === 'steal');
    if (state.plays < 1) setTimeout(() => setS(x => x.turn === 'you' && x.phase === 'play' ? endTurn(x, 'you') : x), anim ? 1200 : 650);
  }
  const continueOut = () => { if (!ended) { setEnded(true); onEnd(sRef.current.winner === 'you'); } };

  // bot loop
  useEffect(() => {
    if (s.phase !== 'play' || s.turn !== 'foe' || s.winner) return;
    const id = setTimeout(() => {
      let st = sRef.current;
      if (st.turn !== 'foe' || st.phase !== 'play') return;
      if (st.plays > (st.bot === 1 ? 1 : 0)) { // easy bot leaves a play on the table
        const mv = botMove(st);
        if (mv) { const r = resolve(st, 'foe', mv); setS(r.state); return; }
      }
      const done = endTurn(st, 'foe'); setS(done);
    }, sRef.current.fx && (sRef.current.fx.kind === 'burn' || sRef.current.fx.kind === 'steal') ? 1200 : 950);
    return () => clearTimeout(id);
  }, [s.phase, s.turn, s.plays, s.winner]);

  // turn timer
  useEffect(() => {
    if (!s.timerOn || s.phase !== 'play' || s.turn !== 'you' || s.winner) return;
    if (s.timer <= 0) { commitEnd(); return; }
    if (s.timer <= 5) window.SFX && window.SFX.play('tick');
    const id = setTimeout(() => setS(x => ({ ...x, timer: x.timer - 1 })), 1000);
    return () => clearTimeout(id);
  }, [s.timer, s.phase, s.turn, s.timerOn, s.winner]);

  const myTurn = s.turn === 'you' && s.phase === 'play' && !s.winner;

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 80, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <PlazaScene />
      <TopBar s={s} match={match} onExit={onExit} />
      <FannedDeck n={s.deck.you.length} />
      {s.phase === 'intro'
        ? <DealIntro match={match} />
        : <>
            {s.tut != null && s.tut < 4 && <div style={{ position: 'absolute', inset: 0, zIndex: 25, background: 'rgba(8,12,22,.52)', animation: 'ownd-fade .35s ease' }} />}
            <div style={{ flex: 1, minHeight: 0, padding: '2px 12px 0', display: 'flex', position: 'relative', zIndex: (s.tut === 2 || s.tut === 3) ? 26 : 2 }}>
              <FeltTable>
                <ZoneRow s={s} side="foe" />
                <ScoreBoard s={s} match={match} />
                <ZoneRow s={s} side="you" mine />
              </FeltTable>
            </div>
            <BottomBar s={s} myTurn={myTurn} commitEnd={commitEnd} />
            <HandArea s={s} myTurn={myTurn} sel={sel} setSel={setSel} play={playCard} setTut={(n) => setS(x => ({ ...x, tut: n }))} />
          </>}
      <FxLayer fx={s.fx} />
      {finalBanner && !s.winner && <FinalRoundBanner />}
      {s.winner && s.phase === 'over' && <DealResult s={s} match={match} onContinue={continueOut} />}
    </div>
  );
}

        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, flexDirection: right ? 'row-reverse' : 'row' }}>
          <Icon type="coin" size={11} color={t.gold} stroke={2.2} />

function HandArea({ s, myTurn, sel, setSel, play, setTut }) {
  const t = useT();

  const selCard = hand.find(c => c.uid === sel);
  const tut = s.tut;
  const tg = s.tutTargets || {};
  const tapCard = (c) => {
    if (!myTurn || s.plays < 1) return;
    if (tut === 0) { if (c.uid !== tg.prop) return; window.SFX && window.SFX.play('select'); setSel(c.uid); setTut(1); return; }
    if (tut === 2) { if (c.uid !== tg.cash) return; window.SFX && window.SFX.play('select'); setSel(c.uid); setTut(3); return; }
    if (tut === 1 || tut === 3) return;
    const willOpen = sel !== c.uid;
    window.SFX && window.SFX.play(willOpen ? 'select' : 'deselect');
    setSel(willOpen ? c.uid : null);
  };
  const ghostOf = (c) => (tut === 0 && c.uid !== tg.prop) || (tut === 2 && c.uid !== tg.cash) || ((tut === 1 || tut === 3) && sel !== c.uid);
  const hiOf = (c) => (tut === 0 && c.uid === tg.prop) || (tut === 2 && c.uid === tg.cash);
  return (
    <div style={{ marginTop: 'auto', position: 'relative', zIndex: 30 }}>
      {/* action menu */}
      {selCard && myTurn && s.plays > 0 && (
        <div style={{ position: 'absolute', bottom: 'calc(100% + 6px)', left: 14, right: 14, zIndex: 30, background: t.surface, borderRadius: 16, boxShadow: '0 -8px 30px rgba(0,0,0,.4)', padding: 12, animation: 'ownd-pop .18s ease' }}>

              const short = selCard.act === 'takeover' && s.plays < 2;
              return <MenuBtn icon={ACT_ICON[selCard.act] || 'flame'} label={selCard.name} sub={short ? 'Needs 2 plays left — not enough now' : selCard.desc} color={AGGRO_ACTS[selCard.act] ? '#d64545' : t.accent} wide ghost={short} onClick={() => play({ t: 'use', uid: sel })} />;
            })()}
          </div>
        </div>
      )}
      {tut != null && myTurn && s.phase === 'play' && <TutBubble step={tut} />}
      {(() => {
        const n = hand.length;
        const W = 76, AVAIL = 372;
        const step = n <= 1 ? 0 : Math.min(W + 8, (AVAIL - W) / (n - 1));
        const stripW = n <= 1 ? W : Math.round((n - 1) * step + W);
        return (
          <div style={{ padding: '4px 0 12px', display: 'flex', justifyContent: 'center' }}>

}
function MenuBtn({ icon, label, sub, color, onClick, wide, hi, ghost }) {

function HandCard({ card, on, dim, onClick, hi, ghost }) {

/* result: victory formula reveal */

}
function Line({ l, v }) {

/* static card face for fx overlays */

const FX_CSS = `

function FxLayer({ fx }) {

        </>
      )}
    </div>
  );
}

Object.assign(window, { DealGame, FxLayer, FxCard, ACTION_DEFS, ACT_ICON, OwndDeal_engine: { initState, resolve, endTurn, buildDeck, specForFoe } });

      {/* parks */}
      <div style={{ position: 'absolute', left: '80%', top: '22%', width: '22%', height: '15%', background: WARM.grass2, borderRadius: '46% 54% 50% 48%' }} />
      <div style={{ position: 'absolute', left: '12%', top: '78%', width: '20%', height: '15%', background: WARM.grass2, borderRadius: '52% 48% 46% 54%' }} />
      {/* buildings */}
      <Building x={16} y={40} w={9} h={8} roof={0} />
      <Building x={86} y={52} w={9} h={8} roof={1} />
      <Building x={80} y={78} w={8} h={7} roof={3} />
      <Building x={26} y={22} w={8} h={7} roof={2} />
      {/* trees */}
      {[[8, 30, 1], [12, 44, .9], [30, 62, 1.1], [40, 40, .9], [62, 30, 1], [70, 60, 1.1], [88, 38, .9], [90, 68, 1], [22, 88, 1.1], [58, 84, 1], [46, 66, .8], [76, 44, .9]].map((p, i) => <Tree key={i} x={p[0]} y={p[1]} s={p[2]} />)}

      {dark && <div style={{ position: 'absolute', inset: 0, background: 'rgba(12,20,34,.4)', pointerEvents: 'none' }} />}

}

/* ───────────── PINS ───────────── */
function ownerColor(card, t) { return card.owner === 'you' ? t.accent : card.owner === 'rival' ? t.rival : TYPES[card.type].color; }

// Signpost card (used over the vector board map)
function Signpost({ card, onClick, selected }) {
  const t = useT();
  const ty = TYPES[card.type];
  const r = RARITY[card.rarity];
  const owned = card.owner === 'you', rival = card.owner === 'rival';
  const head = owned ? t.accent : rival ? t.rival : ty.color;
  return (
    <button onClick={onClick} style={{ position: 'absolute', left: card.x + '%', top: card.y + '%', transform: `translate(-50%,-100%) scale(${selected ? 1.08 : 1})`, zIndex: selected ? 12 : 7, transition: 'transform .14s', animation: !card.owner ? 'ownd-bob 3.4s ease-in-out infinite' : 'none' }}>
      <div style={{ width: 92, background: '#fff', borderRadius: 11, boxShadow: '0 8px 14px rgba(30,45,25,.32)', overflow: 'hidden' }}>
        <div style={{ background: head, padding: '4px 6px', display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 10.5, color: '#fff', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flex: 1 }}>{card.name}</span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '7px 4px 6px' }}>
          <Icon type={card.place} size={26} color={shade(head, -0.05)} stroke={1.9} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 3, marginTop: 4 }}>
            <Icon type="flame" size={13} color="#f0883c" stroke={2} />
            <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: t.ink }}>{fmtK(kValue(card))}</span>
          </div>
        </div>
        {(owned || rival) && <div style={{ position: 'absolute', top: -6, right: -6, width: 20, height: 20, borderRadius: 999, background: owned ? t.accent : t.rival, border: '2px solid #fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon type={owned ? 'check' : 'swords'} size={11} color="#fff" stroke={2.6} /></div>}
      </div>
      {/* post */}
      <div style={{ width: 5, height: 16, background: '#c9bda3', margin: '0 auto', borderRadius: 2 }} />
      <div style={{ width: 20, height: 6, borderRadius: '50%', background: 'rgba(0,0,0,.18)', margin: '-1px auto 0', filter: 'blur(1px)' }} />
    </button>
  );
}

// Compact teardrop marker (used over the illustrated photo map so it doesn't fight the art)
function CompactPin({ card, onClick, selected }) {
  const t = useT();
  const ty = TYPES[card.type];
  const r = RARITY[card.rarity];
  const owned = card.owner === 'you', rival = card.owner === 'rival';
  const dotBg = owned ? t.accent : rival ? t.rival : ty.color;
  return (
    <button onClick={onClick} style={{ position: 'absolute', left: card.x + '%', top: card.y + '%', transform: `translate(-50%,-100%) scale(${selected ? 1.14 : 1})`, zIndex: selected ? 12 : 7, transition: 'transform .14s', animation: !card.owner ? 'ownd-bob 3s ease-in-out infinite' : 'none' }}>
      <div style={{ position: 'absolute', bottom: '112%', left: '50%', transform: 'translateX(-50%)', whiteSpace: 'nowrap', background: dotBg, color: '#fff', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 11.5, padding: '2px 8px', borderRadius: 999, boxShadow: '0 3px 8px rgba(0,0,0,.3)' }}>{fmtK(kValue(card))}</div>
      <div style={{ position: 'relative', width: 44, height: 50, filter: 'drop-shadow(0 5px 6px rgba(0,0,0,.35))' }}>
        <div style={{ position: 'absolute', top: 0, left: 1, width: 42, height: 42, borderRadius: '50% 50% 50% 0', transform: 'rotate(45deg)', background: dotBg, border: '3px solid #fff', boxSizing: 'border-box' }} />
        <div style={{ position: 'absolute', top: 6, left: 7, width: 30, height: 30, borderRadius: 999, background: 'rgba(255,255,255,.22)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: 'inset 0 0 0 2px rgba(255,255,255,.65)' }}>
          <Icon type={card.place} size={17} color="#fff" stroke={2} />
        </div>
        <div style={{ position: 'absolute', top: -5, right: -5, width: 18, height: 18, borderRadius: 999, background: r.color, border: '2px solid #fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {owned ? <Icon type="check" size={10} color="#fff" stroke={3} /> : rival ? <Icon type="swords" size={10} color="#fff" stroke={2.4} /> : <Icon type="gem" size={10} color="#fff" stroke={2.4} />}
        </div>
      </div>
    </button>
  );
}

/* ───────────── MAP / COLLECT SCREEN ───────────── */
function MapScreen({ api }) {
  const t = useT();
  const cards = api.cards.filter(c => c.city === api.city);
  const wild = cards.filter(c => !c.owner).length;
  const [pref, setPref] = useState({});
  const usePhoto = pref[api.city] ?? !!MAP_SRC[api.city];
  const Pin = usePhoto ? CompactPin : Signpost;
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
      {usePhoto
        ? <image-slot id={'ownd-map-' + api.city} src={MAP_SRC[api.city] || ''} fit="cover" placeholder="Drop an illustrated city map" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}></image-slot>
        : <MapBoard cityId={api.city} dark={t.dark} />}

      {cards.map(c => <Pin key={c.id} card={c} selected={api.selected?.id === c.id} onClick={() => api.setSelected(c)} />)}

      {/* bottom-left: places to collect */}
      <div style={{ position: 'absolute', left: 14, bottom: 116, zIndex: 16, background: t.surface, borderRadius: 14, padding: '9px 14px', boxShadow: t.shadow, display: 'flex', alignItems: 'center', gap: 8 }}>
        <Icon type="scan" size={19} color={t.accent} stroke={2.2} />
        <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: t.ink }}>{wild} to collect nearby</span>
      </div>

      {/* right rail: map-style + travel */}
      <div style={{ position: 'absolute', right: 14, bottom: 116, zIndex: 18, display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'center' }}>
        <button onClick={() => setPref(p => ({ ...p, [api.city]: !usePhoto }))} title="Map style" style={{ width: 46, height: 46, borderRadius: 14, background: t.surface, boxShadow: t.shadow, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon type={usePhoto ? 'map' : 'pin'} size={22} color={t.accent} stroke={2.1} />
        </button>
        <button onClick={() => api.setTab('teleport')} style={{ width: 54, height: 54, borderRadius: 17, background: t.surface, boxShadow: t.shadow, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1 }}>
          <Icon type="globe" size={26} color={t.accent} />
          <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 8.5, color: t.sub, letterSpacing: .3 }}>TRAVEL</span>
        </button>
      </div>
    </div>
  );
}

/* ───────────── PLACE DETAIL SHEET ───────────── */
function PlaceSheet({ card, api }) {
  const t = useT();
  const r = RARITY[card.rarity];
  const ty = TYPES[card.type];
  const s = statsOf(card);
  const mv = MOVES[card.type];
  const owned = card.owner === 'you', rival = card.owner === 'rival';
  const inDeck = api.inDeck(card.id);
  const close = () => api.setSelected(null);
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 50 }}>
      <div onClick={close} style={{ position: 'absolute', inset: 0, background: 'rgba(10,16,28,.55)', animation: 'ownd-fade .25s ease' }} />
      <div className="ownd-scroll" style={{ position: 'absolute', left: 0, right: 0, bottom: 0, maxHeight: '86%', overflowY: 'auto', background: t.surface, borderRadius: '28px 28px 0 0', boxShadow: '0 -20px 50px rgba(0,0,0,.3)', animation: 'ownd-sheetup .32s cubic-bezier(.2,.8,.2,1)', padding: '20px 22px 30px' }}>
        <button onClick={close} style={{ position: 'absolute', top: 14, right: 16, width: 34, height: 34, borderRadius: 999, background: t.surface2, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2 }}><Icon type="close" size={20} /></button>
        <div style={{ display: 'flex', gap: 18 }}>
          <CardFace card={card} w={132} owned={owned} sel={inDeck} />
          <div style={{ flex: 1, paddingTop: 2, minWidth: 0 }}>
            <div style={{ marginBottom: 6 }}><TypeBadge type={card.type} size={12} /></div>
            <h2 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 22, color: t.ink, margin: '0 0 2px', lineHeight: 1.04 }}>{card.name}</h2>
            <div style={{ fontSize: 12.5, fontWeight: 700, color: r.color, textTransform: 'uppercase', letterSpacing: .5, marginBottom: 12 }}>{r.label} · {fmtK(kValue(card))}</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <StatBox icon="heart" color="#e0524f" label="Health" val={s.hp} t={t} />
              <StatBox icon="sword" color={t.ink} label="Attack" val={s.atk} t={t} />
            </div>
          </div>
        </div>

        {/* fame + signature */}
        <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
          <div style={{ flex: 1, background: t.surface2, borderRadius: 14, padding: '11px 13px' }}>
            <div style={{ fontSize: 11.5, fontWeight: 800, color: t.sub, textTransform: 'uppercase', letterSpacing: .4, marginBottom: 6 }}>Real-world fame</div>
            <div style={{ height: 8, borderRadius: 999, background: t.faint, overflow: 'hidden' }}><div style={{ width: card.fame + '%', height: '100%', background: t.gold, borderRadius: 999 }} /></div>
            <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13, color: t.ink, marginTop: 6 }}>{card.fame}/100 — powers its stats</div>
          </div>
        </div>
        <div style={{ background: ty.color + '14', borderRadius: 14, padding: '11px 13px', marginTop: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 4 }}>
            <Icon type="flame" size={16} color={shade(ty.color, -.15)} stroke={2.1} />
            <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15, color: t.ink }}>{mv.name}</span>
            <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 11.5, color: shade(ty.color, -.15) }}>signature</span>
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: t.sub, lineHeight: 1.35 }}>{mv.desc}</div>
        </div>
        <div style={{ fontSize: 12.5, fontWeight: 700, color: t.sub, textAlign: 'center', margin: '12px 0 2px' }}>
          {ty.label} beats <b style={{ color: shade(TYPES[ty.beats].color, -.1) }}>{TYPES[ty.beats].label}</b> · weak to {weakTo(card.type)}
        </div>

        {/* actions */}
        <div style={{ marginTop: 14 }}>
          {!card.owner && <Btn full onClick={() => api.collect(card)}><Icon type="scan" size={20} stroke={2.1} color="#fff" /> Scout &amp; collect</Btn>}
          {rival && <>
            <Btn full kind="rival" onClick={() => { close(); api.attackTerritory(card); }}><Icon type="swords" size={20} stroke={2.1} color="#fff" /> Battle {card.by} for it</Btn>
            <p style={{ textAlign: 'center', fontSize: 12.5, fontWeight: 700, color: t.sub, margin: '10px 0 0' }}>Win the duel to seize this territory.</p>
          </>}
          {owned && <Btn full kind={inDeck ? 'sec' : 'primary'} onClick={() => { const ok = api.toggleDeck(card.id); if (!ok) api.showToast('Deck is full — remove a card first'); }}>
            <Icon type={inDeck ? 'check' : 'plus'} size={20} stroke={2.4} color={inDeck ? t.ink : '#fff'} /> {inDeck ? 'In your deck — tap to remove' : 'Add to battle deck'}
          </Btn>}
        </div>
      </div>
    </div>
  );
}
function weakTo(type) {
  const w = Object.keys(TYPES).find(k => TYPES[k].beats === type);
  return TYPES[w].label;
}
function StatBox({ icon, color, label, val, t }) {
  return (
    <div style={{ flex: 1, background: t.surface2, borderRadius: 14, padding: '10px 12px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <Icon type={icon} size={17} color={color} stroke={2.2} />
        <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 22, color: t.ink, lineHeight: 1 }}>{val}</span>
      </div>
      <div style={{ fontSize: 11.5, fontWeight: 700, color: t.sub, marginTop: 4 }}>{label}</div>
    </div>
  );
}

/* ───────────── COLLECT OVERLAY ───────────── */
function CollectOverlay({ card, api }) {
  const t = useT();
  const [stage, setStage] = useState('scan');
  useEffect(() => {
    const id = setTimeout(() => { setStage('reveal'); api.doCollect(card.id); }, 1500);
    return () => clearTimeout(id);
  }, []);
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 75, background: 'rgba(8,14,26,.82)', backdropFilter: 'blur(3px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', animation: 'ownd-fade .25s ease' }}>
      {stage === 'scan' ? (
        <div style={{ textAlign: 'center' }}>
          <div style={{ position: 'relative', width: 120, height: 120, margin: '0 auto 20px' }}>
            <div style={{ position: 'absolute', inset: 0, borderRadius: 30, border: `3px solid ${t.accent}`, animation: 'ownd-pulse 1.4s ease-out infinite' }} />
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon type="scan" size={54} color="#fff" stroke={1.8} /></div>
          </div>
          <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 20, color: '#fff' }}>Scouting {card.name}…</div>
          <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: 'rgba(255,255,255,.6)', marginTop: 4 }}>capturing the place</div>
        </div>
      ) : (
        <div style={{ textAlign: 'center', position: 'relative' }}>
          <Confetti />
          <div style={{ animation: 'ownd-pop .5s ease' }}><CardFace card={card} w={172} owned /></div>
          <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 26, color: t.gold, margin: '18px 0 2px' }}>COLLECTED!</div>
          <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 14, color: 'rgba(255,255,255,.75)', marginBottom: 20 }}>{card.name} joined your collection.</div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
            <Btn kind="sec" onClick={() => api.closeCollect()} style={{ background: 'rgba(255,255,255,.16)', color: '#fff', border: 'none' }}>Keep exploring</Btn>
            <Btn onClick={() => { api.closeCollect(); api.setTab('deck'); }}>Add to deck</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ───────────── HUD + BOTTOM NAV ───────────── */
function HUD({ api }) {
  const t = useT();
  const city = CITIES.find(c => c.id === api.city);
  const level = Math.max(1, Math.floor(api.trophies / 200));
  return (
    <div style={{ position: 'absolute', top: 50, left: 14, right: 14, zIndex: 16, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 9 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, width: '100%' }}>
        {/* avatar + level */}
        <div style={{ position: 'relative', width: 46, height: 46, borderRadius: 14, background: t.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 5px 0 0 ${shade(t.accent, -0.2)}`, flexShrink: 0 }}>
          <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 20, color: '#fff' }}>{api.name[0]}</span>
          <div style={{ position: 'absolute', bottom: -6, left: '50%', transform: 'translateX(-50%)', minWidth: 26, height: 20, padding: '0 5px', borderRadius: 999, background: t.gold, border: '2px solid #fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
            <Icon type="star" size={10} color="#fff" stroke={2} /><span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 11, color: '#fff' }}>{level}</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 7 }}>
          <Pill icon={<Icon type="trophy" size={14} color="#fff" stroke={2.2} />} color={t.gold} style={{ fontSize: 15, padding: '6px 12px 6px 6px' }}>{api.trophies}</Pill>
          <Pill icon={<Icon type="scan" size={14} color="#fff" stroke={2.2} />} color={t.accent} style={{ fontSize: 15, padding: '6px 12px 6px 6px' }}>{api.scans}</Pill>
        </div>
      </div>
      {/* location banner */}
      <button onClick={() => api.setTab('teleport')} style={{ display: 'inline-flex', alignItems: 'center', gap: 7, background: t.surface, borderRadius: 999, padding: '8px 18px 8px 14px', boxShadow: t.shadow }}>
        <Icon type="pin" size={18} color={t.accent} stroke={2.2} />
        <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15.5, color: t.ink, letterSpacing: .6, textTransform: 'uppercase' }}>{city.name}</span>
      </button>
    </div>
  );
}

function BottomNav({ tab, setTab, threats }) {
  const t = useT();
  const items = [['map', 'Map', 'map'], ['deck', 'Deck', 'deck'], ['arena', 'Arena', 'swords'], ['profile', 'You', 'you']];
  return (
    <div style={{ position: 'absolute', left: 14, right: 14, bottom: 28, zIndex: 20, height: 64, background: t.surface, borderRadius: 22, boxShadow: t.shadow, display: 'flex', padding: 6 }}>
      {items.map(([id, label, icon]) => {
        const on = tab === id || (id === 'map' && tab === 'teleport');
        return <button key={id} onClick={() => setTab(id)} style={{ flex: 1, position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3, borderRadius: 16, background: on ? t.accent + '18' : 'transparent' }}>
          <Icon type={icon} size={22} color={on ? t.accent : t.sub} stroke={on ? 2.4 : 2} />
          <span style={{ fontFamily: 'Fredoka', fontWeight: 600, fontSize: 11.5, color: on ? t.accent : t.sub }}>{label}</span>
          {id === 'arena' && threats > 0 && <span style={{ position: 'absolute', top: 4, right: '50%', marginRight: -22, minWidth: 17, height: 17, padding: '0 4px', borderRadius: 999, background: t.rival, color: '#fff', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 11, display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1.5px solid ${t.surface}` }}>{threats}</span>}
        </button>;
      })}
    </div>
  );
}

Object.assign(window, { MapScreen, MapBoard, Signpost, CompactPin, PlaceSheet, CollectOverlay, HUD, BottomNav, StatBox });

</script>
  <script type="text/babel">
// OWND — deck builder, arena hub, travel, profile
const { useState, useEffect, useMemo } = React;
const { useT, TYPES, typeMult, RARITY, statsOf, CITIES, LEAGUES, leagueFor, shade, Icon, Btn, Pill, TypeBadge, CardFace, Stat } = window;

/* ───────────── DECK BUILDER ───────────── */
function DeckScreen({ api }) {
  const t = useT();
  const owned = api.cards.filter(c => c.owner === 'you');
  const deck = api.deckCards;
  const power = deck.reduce((s, c) => s + statsOf(c).pwr, 0);
  const coverage = Object.keys(TYPES).filter(ty => deck.some(c => c.type === ty));
  return (
    <div className="ownd-scroll" style={{ position: 'absolute', inset: 0, background: t.surface2, overflowY: 'auto', paddingTop: 96, paddingBottom: 120 }}>
      <div style={{ padding: '0 16px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 12 }}>
          <div>
            <h1 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 27, color: t.ink, margin: 0 }}>Battle deck</h1>
            <div style={{ fontSize: 13.5, fontWeight: 700, color: t.sub }}>{deck.length}/3 places · pick your squad</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 24, color: t.accent, lineHeight: 1, display: 'flex', alignItems: 'center', gap: 5 }}><Icon type="bolt" size={20} color={t.accent} stroke={2} />{power}</div>
            <div style={{ fontSize: 12, fontWeight: 700, color: t.sub }}>deck power</div>
          </div>
        </div>

        {/* deck slots */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
          {[0, 1, 2].map(i => {
            const c = deck[i];
            return c
              ? <div key={i} style={{ flex: 1, position: 'relative' }} onClick={() => api.toggleDeck(c.id)}>
                  <CardFace card={c} w={104} sel style={{ width: '100%' }} />
                  <div style={{ position: 'absolute', top: 6, right: 6, width: 24, height: 24, borderRadius: 999, background: t.rival, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '2px solid #fff' }}><Icon type="close" size={13} color="#fff" stroke={3} /></div>
                </div>
              : <div key={i} style={{ flex: 1, aspectRatio: '1 / 1.42', borderRadius: 12, border: `2.5px dashed ${t.faint}`, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 6, color: t.sub }}>
                  <Icon type="plus" size={26} color={t.sub} stroke={2.4} />
                  <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12 }}>Empty</span>
                </div>;
          })}
        </div>

        {/* coverage + battle */}
        <div style={{ background: t.surface, borderRadius: 16, padding: 14, boxShadow: t.shadow, marginBottom: 20 }}>
          <div style={{ fontSize: 11.5, fontWeight: 800, color: t.sub, textTransform: 'uppercase', letterSpacing: .4, marginBottom: 9 }}>Type coverage</div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
            {Object.keys(TYPES).map(ty => {
              const has = coverage.includes(ty);
              return <div key={ty} style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6, background: has ? TYPES[ty].color + '1e' : t.surface2, borderRadius: 10, padding: '7px 9px', opacity: has ? 1 : .55 }}>
                <span style={{ width: 20, height: 20, borderRadius: 999, background: has ? TYPES[ty].color : t.faint, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon type={TYPES[ty].icon} size={12} color={has ? '#fff' : t.sub} stroke={2.4} /></span>
                <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12.5, color: t.ink }}>{TYPES[ty].label}</span>
              </div>;
            })}
          </div>
          <Btn full disabled={owned.length < 3} onClick={() => api.setTab('arena')}>
            <Icon type="swords" size={20} stroke={2.1} color="#fff" /> {owned.length < 3 ? 'Collect 3 places to battle' : 'Find a match'}
          </Btn>
          {coverage.length === 3 && <div style={{ textAlign: 'center', fontSize: 12.5, fontWeight: 700, color: t.accent, marginTop: 10 }}>All three types covered — great balance!</div>}
        </div>

        {/* collection */}
        <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 16, color: t.ink, marginBottom: 10 }}>Your collection · {owned.length}</div>
        {owned.length === 0 && <div style={{ textAlign: 'center', padding: '40px 20px', color: t.sub }}>
          <Icon type="deck" size={44} color={t.sub} /><p style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15, margin: '10px 0 0', color: t.ink }}>No places yet</p>
          <p style={{ fontSize: 13.5, fontWeight: 600 }}>Collect places on the map to build a deck.</p>
        </div>}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10 }}>
          {owned.map(c => {
            const inDeck = api.inDeck(c.id);
            return <div key={c.id} onClick={() => { const ok = api.toggleDeck(c.id); if (!ok) api.showToast('Deck is full — remove one first'); }}>
              <CardFace card={c} w={104} sel={inDeck} owned={inDeck} style={{ width: '100%' }} />
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}

/* ───────────── ARENA HUB ───────────── */
function ArenaScreen({ api }) {
  const t = useT();
  const lg = leagueFor(api.trophies);
  const next = LEAGUES[LEAGUES.indexOf(lg) + 1];
  const prog = next ? Math.min(1, (api.trophies - lg.min) / (next.min - lg.min)) : 1;
  const ready = api.cards.filter(c => c.owner === 'you').length >= 3;
  const attackable = api.cards.filter(c => c.owner === 'rival');
  const go = (fn) => { if (!ready) { api.showToast('Collect at least 3 places first'); api.setTab('map'); return; } fn(); };
  return (
    <div className="ownd-scroll" style={{ position: 'absolute', inset: 0, background: t.surface2, overflowY: 'auto', paddingTop: 96, paddingBottom: 120 }}>
      <div style={{ padding: '0 16px' }}>
        <h1 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 27, color: t.ink, margin: '0 0 12px' }}>Arena</h1>

        {/* league card */}
        <div style={{ background: `linear-gradient(135deg, ${lg.color}, ${shade(lg.color, -.28)})`, borderRadius: 20, padding: 16, marginBottom: 20, boxShadow: t.shadow }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 52, height: 52, borderRadius: 16, background: 'rgba(255,255,255,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon type="trophy" size={30} color="#fff" stroke={2} /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 20, color: '#fff' }}>{lg.name} League</div>
              <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: 'rgba(255,255,255,.85)' }}>{api.trophies} trophies</div>
            </div>
          </div>
          <div style={{ height: 9, borderRadius: 999, background: 'rgba(0,0,0,.2)', overflow: 'hidden', marginTop: 13 }}><div style={{ width: prog * 100 + '%', height: '100%', background: '#fff', borderRadius: 999, transition: 'width .4s' }} /></div>
          <div style={{ fontSize: 12, fontWeight: 700, color: 'rgba(255,255,255,.85)', marginTop: 7 }}>{next ? `${next.min - api.trophies} trophies to ${next.name}` : 'Top league reached!'}</div>
        </div>

        {/* ranked ladder */}
        <SectionTitle icon="target" label="Ranked ladder" t={t} />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 22 }}>
          {api.ladder.map(m => <OpponentRow key={m.id} m={m} myPower={api.myPower} onBattle={() => go(() => api.startBattle(m))} t={t} />)}
        </div>

        {/* defend */}
        {api.threats.length > 0 && <>
          <SectionTitle icon="shield" label="Defend your turf" t={t} accent={t.rival} />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 22 }}>
            {api.threats.map(th => (
              <div key={th.key} style={{ background: t.surface, borderRadius: 16, padding: 12, boxShadow: t.shadow, borderLeft: `4px solid ${t.rival}`, display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 42, height: 42, borderRadius: 12, background: TYPES[th.place.type].color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon type={th.place.place} size={22} color="#fff" stroke={2} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15.5, color: t.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{th.place.name}</div>
                  <div style={{ fontSize: 12.5, fontWeight: 700, color: t.rival }}>{th.by} is raiding it!</div>
                </div>
                <Btn small kind="rival" onClick={() => go(() => api.defendTerritory(th))}>Defend</Btn>
              </div>
            ))}
          </div>
        </>}

        {/* take territory */}
        <SectionTitle icon="pin" label="Take territory" t={t} />
        {attackable.length === 0 && <div style={{ fontSize: 13.5, fontWeight: 700, color: t.sub, padding: '6px 2px 20px' }}>No rival-held places here. Travel to find more.</div>}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {attackable.map(c => {
            const city = CITIES.find(x => x.id === c.city);
            return <div key={c.id} style={{ background: t.surface, borderRadius: 16, padding: 12, boxShadow: t.shadow, display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 42, height: 42, borderRadius: 12, background: TYPES[c.type].color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon type={c.place} size={22} color="#fff" stroke={2} /></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15.5, color: t.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.name}</div>
                <div style={{ fontSize: 12.5, fontWeight: 700, color: t.sub }}>Held by {c.by} · {city.short}</div>
              </div>
              <Btn small onClick={() => go(() => api.attackTerritory(c))}>Attack</Btn>
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}
function SectionTitle({ icon, label, t, accent }) {
  return <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 11 }}>
    <Icon type={icon} size={19} color={accent || t.ink} stroke={2.2} />
    <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 18, color: t.ink }}>{label}</span>
  </div>;
}
function OpponentRow({ m, myPower, onBattle, t }) {
  const diff = m.power - myPower;
  const tag = diff > 40 ? { c: t.rival, l: 'tough' } : diff < -40 ? { c: '#2fb56a', l: 'easy' } : { c: t.gold, l: 'even' };
  return (
    <div style={{ background: t.surface, borderRadius: 16, padding: 12, boxShadow: t.shadow, display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ width: 46, height: 46, borderRadius: 999, background: m.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 20, flexShrink: 0 }}>{m.name[0]}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 16, color: t.ink }}>{m.name}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 2 }}>
          <span style={{ fontSize: 12.5, fontWeight: 700, color: t.sub, display: 'inline-flex', alignItems: 'center', gap: 3 }}><Icon type="bolt" size={13} color={t.sub} stroke={2} />{m.power}</span>
          <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 11, color: tag.c, background: tag.c + '1e', padding: '2px 8px', borderRadius: 999 }}>{tag.l}</span>
        </div>
      </div>
      <div style={{ textAlign: 'right', marginRight: 4 }}>
        <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 14, color: t.gold, display: 'inline-flex', alignItems: 'center', gap: 3 }}><Icon type="trophy" size={14} color={t.gold} stroke={2.2} />+{m.reward}</div>
      </div>
      <Btn small onClick={onBattle}>Battle</Btn>
    </div>
  );
}

/* ───────────── TRAVEL ───────────── */
function TeleportScreen({ api }) {
  const t = useT();
  return (
    <div style={{ position: 'absolute', inset: 0, background: `linear-gradient(180deg, ${t.accent}, ${shade(t.accent, -.25)})`, overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 0, opacity: .15, backgroundImage: 'radial-gradient(circle at 30% 20%, #fff 0 1px, transparent 1px), radial-gradient(circle at 70% 60%, #fff 0 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
      <div className="ownd-scroll" style={{ position: 'relative', padding: '66px 20px 40px', textAlign: 'center', height: '100%', overflowY: 'auto', boxSizing: 'border-box' }}>
        <span style={{ display: 'inline-block', animation: 'ownd-bob 3s ease-in-out infinite' }}><Icon type="globe" size={78} color="#fff" stroke={1.6} /></span>
        <h1 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 29, color: '#fff', margin: '12px 0 4px' }}>Travel</h1>
        <p style={{ fontSize: 15, fontWeight: 700, color: 'rgba(255,255,255,.8)', margin: '0 0 24px' }}>Jet to a new city to collect rarer places.</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {CITIES.map(c => {
            const here = c.id === api.city;
            const owned = api.cards.filter(x => x.city === c.id && x.owner === 'you').length;
            const total = api.cards.filter(x => x.city === c.id).length;
            return (
              <button key={c.id} disabled={c.locked} onClick={() => { if (c.locked) { api.showToast('Reach Gold League to unlock Tokyo'); return; } api.setCity(c.id); api.setTab('map'); api.showToast('Traveled to ' + c.short); }}
                style={{ display: 'flex', alignItems: 'center', gap: 14, background: here ? '#fff' : 'rgba(255,255,255,.14)', borderRadius: 18, padding: '14px 16px', textAlign: 'left', opacity: c.locked ? .6 : 1 }}>
                <div style={{ width: 46, height: 46, borderRadius: 13, background: here ? t.accent : 'rgba(255,255,255,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon type={c.locked ? 'lock' : 'pin'} size={24} color="#fff" stroke={2.2} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 18, color: here ? t.ink : '#fff' }}>{c.short}</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: here ? t.sub : 'rgba(255,255,255,.75)' }}>{c.locked ? 'Locked' : owned + '/' + total + ' collected'}</div>
                </div>
                {here ? <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13, color: t.accent }}>HERE</span>
                  : !c.locked && <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 14, color: '#fff', background: t.gold, padding: '7px 14px', borderRadius: 11 }}>GO</span>}
              </button>
            );
          })}
        </div>
        <button onClick={() => api.setTab('map')} style={{ margin: '20px auto 0', color: 'rgba(255,255,255,.85)', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15 }}>Back to map</button>
      </div>
    </div>
  );
}

/* ───────────── PROFILE ───────────── */
function ProfileScreen({ api }) {
  const t = useT();
  const owned = api.cards.filter(c => c.owner === 'you');
  const held = api.cards.filter(c => c.owner === 'you' && c.captured).length;
  const lg = leagueFor(api.trophies);
  const board = [{ name: api.name, tr: api.trophies, me: true, color: t.accent }, ...api.ladder.map(m => ({ name: m.name, tr: m.trophies, color: m.color }))]
    .sort((a, b) => b.tr - a.tr);
  const rank = board.findIndex(b => b.me) + 1;
  return (
    <div className="ownd-scroll" style={{ position: 'absolute', inset: 0, background: t.surface2, overflowY: 'auto', paddingTop: 96, paddingBottom: 120 }}>
      <div style={{ padding: '0 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 18 }}>
          <div style={{ width: 64, height: 64, borderRadius: 20, background: t.accent, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 28, boxShadow: `0 6px 0 0 ${shade(t.accent, -0.2)}` }}>{api.name[0]}</div>
          <div>
            <h1 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 25, color: t.ink, margin: 0 }}>{api.name}</h1>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: lg.color + '22', color: shade(lg.color, -0.2), fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, padding: '3px 10px', borderRadius: 999, marginTop: 4 }}>
              <Icon type="trophy" size={15} color={shade(lg.color, -0.2)} stroke={2.2} /> {lg.name} · #{rank} nearby
            </div>
          </div>
        </div>

        <div style={{ display: 'flex', gap: 10, marginBottom: 22 }}>
          <BigStat label="Trophies" value={api.trophies} accent t={t} />
          <BigStat label="Collected" value={owned.length} t={t} />
          <BigStat label="Wins" value={api.wins} t={t} />
        </div>

        <h2 style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 18, color: t.ink, margin: '0 0 12px' }}>Leaderboard</h2>
        <div style={{ background: t.surface, borderRadius: 18, padding: 6, boxShadow: t.shadow, marginBottom: 22 }}>
          {board.map((b, i) => (
            <div key={b.name} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '11px 12px', borderBottom: i < board.length - 1 ? `1px solid ${t.faint}` : 'none', background: b.me ? t.accent + '12' : 'transparent', borderRadius: 12 }}>
              <div style={{ width: 24, fontFamily: 'Fredoka', fontWeight: 700, fontSize: 17, color: i === 0 ? t.gold : t.sub }}>{i + 1}</div>
              <div style={{ width: 38, height: 38, borderRadius: 999, background: b.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 16 }}>{b.name[0]}</div>
              <div style={{ flex: 1, fontFamily: 'Fredoka', fontWeight: 600, fontSize: 16.5, color: t.ink }}>{b.name}{b.me ? ' (you)' : ''}</div>
              <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 15, color: t.ink, display: 'inline-flex', alignItems: 'center', gap: 4 }}><Icon type="trophy" size={14} color={t.gold} stroke={2.2} />{b.tr}</div>
            </div>
          ))}
        </div>
        <button onClick={api.reset} style={{ width: '100%', padding: '13px', borderRadius: 14, background: t.faint, color: t.sub, fontFamily: 'Fredoka', fontWeight: 600, fontSize: 15 }}>Reset game</button>
      </div>
    </div>
  );
}
function BigStat({ label, value, accent, t }) {
  return <div style={{ flex: 1, background: accent ? t.accent : t.surface, borderRadius: 18, padding: '14px 14px', boxShadow: t.shadow }}>
    <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 23, color: accent ? '#fff' : t.ink, lineHeight: 1 }}>{value}</div>
    <div style={{ fontSize: 12.5, fontWeight: 700, color: accent ? 'rgba(255,255,255,.8)' : t.sub, marginTop: 5 }}>{label}</div>
  </div>;
}

Object.assign(window, { DeckScreen, ArenaScreen, TeleportScreen, ProfileScreen });

</script>
  <script type="text/babel">
// OWND v2 — onboarding screens following the playtest framework:
// ZASADY (rules) → LEVEL (match) → MECHANIKA (duel) → NAGRODA (reward) → SYGNAŁ CELU (leaderboard) ×3 → CEL ✓ (champion)
const { useState, useEffect, useMemo, useRef } = React;
const { useT, TYPES, shade, Icon, Btn, Confetti, leagueFor } = window;

/* ═══════════ ONBOARDING LEAGUE DATA ═══════════ */
const ONB = {
  start: 210, // your starting trophies → rank #8 of 8
  league: 'Bronze League',
  bots: [
    { id: 'priya', name: 'Priya', color: '#7a5af0', trophies: 640 },

    { id: 'iris',  name: 'Iris',  color: '#22a58a', trophies: 400 },
    { id: 'kenji', name: 'Kenji', color: '#f0883c', trophies: 340 },
    { id: 'bo',    name: 'Bo',    color: '#b3312e', trophies: 280 },
    { id: 'zia',   name: 'Zia',   color: '#8a6d3b', trophies: 230 },
  ],
  matches: [
    { id: 'kenji', name: 'Kenji', color: '#f0883c', trophies: 340, reward: 140, rounds: 4, tut: true,  rig: true, bot: 1, squad: ['pier39', 'painted', 'cablecar'], tag: 'Warm-up duel',          sub: 'Learns you the ropes' },
    { id: 'mara',  name: 'Mara',  color: '#e0559b', trophies: 470, reward: 160, rounds: 5, tut: false, rig: true, bot: 2, squad: ['zakrzowek', 'planty', 'florian'],  tag: 'Rival at your level',   sub: 'No more training wheels' },
    { id: 'priya', name: 'Priya', color: '#7a5af0', trophies: 640, reward: 180, rounds: 6, tut: false, rig: true, bot: 2, squad: ['oldtown', 'lazienki', 'sejm'],     tag: 'LEAGUE FINAL',          sub: 'Beat the leader for #1' },
  ],
};
const rankFor = (t) => [...ONB.bots.map(b => b.trophies), t].sort((a, b) => b - a).indexOf(t) + 1;

/* ═══════════ RULES CAROUSEL (ZASADY) ═══════════ */
function RuleCard({ color, filled, w = 34 }) {
  return (
    <div style={{ width: w, height: w * 1.36, borderRadius: 7, flexShrink: 0, background: filled ? `linear-gradient(160deg, ${shade(color, .25)}, ${color})` : 'transparent', border: filled ? '2.5px solid #fff' : `2.5px dashed ${color}88`, boxShadow: filled ? '0 4px 9px rgba(0,0,0,.18)' : 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      {filled && <Icon type="landmark" size={w * 0.44} color="#fff" stroke={2.2} />}
    </div>

}
function VisualDuel() {
  const t = useT();
  const face = (c, l) => (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
      <div style={{ width: 56, height: 56, borderRadius: 18, background: `linear-gradient(150deg, ${shade(c, .22)}, ${c})`, border: '3px solid #fff', boxShadow: '0 6px 14px rgba(0,0,0,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fredoka', fontWeight: 700, fontSize: 22, color: '#fff' }}>{l[0]}</div>
      <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 12.5, color: t.sub }}>{l}</span>
    </div>
  );
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
      {face(t.accent, 'You')}
      <div style={{ width: 52, height: 52, borderRadius: 999, background: t.rival, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 6px 0 0 ${shade(t.rival, -0.22)}`, transform: 'rotate(-6deg)' }}>
        <Icon type="swords" size={27} color="#fff" stroke={2} />
      </div>

}
function VisualSet() {

  const c = TYPES.heritage.color;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
      <div style={{ display: 'flex', gap: 8 }}>
        <RuleCard color={c} filled /><RuleCard color={c} filled /><RuleCard color={c} />
      </div>
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: t.gold, borderRadius: 999, padding: '4px 12px', boxShadow: `0 4px 0 0 ${shade(t.gold, -0.2)}` }}>

        <span style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: '#fff' }}>3 of a colour = ×multiplier</span>
      </div>

}
function VisualBank() {
  const t = useT();
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 9 }}>
      <div style={{ position: 'relative', width: 86, height: 64 }}>
        {[0, 1, 2].map(i => (
          <div key={i} style={{ position: 'absolute', top: i * 14, left: '50%', transform: `translateX(-50%) rotate(${(i - 1) * 3}deg)`, width: 62, height: 40, borderRadius: 8, background: 'linear-gradient(160deg,#45b673,#1f7a45)', border: '2.5px solid #fff', boxShadow: '0 4px 8px rgba(0,0,0,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: i }}>

      <div style={{ fontFamily: 'Fredoka', fontWeight: 700, fontSize: 13.5, color: t.ink, background: t.surface, borderRadius: 999, padding: '5px 13px', boxShadow: t.shadow }}>
        Bank × Multipliers = <span style={{ color: t.accent }}>Victory Value</span>
      </div>
    </div>
  );
}
const RULE_SLIDES = [
  { visual: VisualDuel, title: 'Card duels, one on one', body: 'Every match is you vs a rival. You get 3 plays per turn — beat their Victory Value before the rounds run out.' },
  { visual: VisualSet,  title: 'Invest cards into sets', body: 'Play place cards onto the table. Three of one colour completes a set and unlocks its ×multiplier — complete two sets and the duel ends instantly.' },
  { visual: VisualBank, title: 'Bank cash to score',     body: 'Bank cash and spare cards — banked money is your score fuel. Action cards steal and sabotage your rival.' },
];

function RulesIntro({ onDone }) {
  const t = useT();
  const [slide, setSlide] = useState(0);
  const s = RULE_SLIDES[slide];
  const last = slide === RULE_SLIDES.length - 1;
  const V = s.visual;

const ROW_H = 54, ROW_GAP = 7, SLOT = ROW_H + ROW_GAP;
function useCountUp(from, to, run, ms = 950) {
  const [v, setV] = useState(from);
  useEffect(() => {
    if (!run) return;
    let start; let raf;
    const f = (ts) => { if (!start) start = ts; const p = Math.min(1, (ts - start) / ms); setV(Math.round(from + (to - from) * (1 - Math.pow(1 - p, 3)))); if (p < 1) raf = requestAnimationFrame(f); };
    raf = requestAnimationFrame(f);
    return () => cancelAnimationFrame(raf);
  }, [run]);
  return run ? v : from;
}

function BoardScreen({ lvl, oldT, newT, onNext }) {
  const t = useT();

  const count = useCountUp(oldT, newT, go);

  const rows = useMemo(() => {
    const list = [...ONB.bots.map(b => ({ ...b })), { id: 'you', name: 'You', color: t.accent, trophies: newT, you: true }];

    const newIdx = list.findIndex(r => r.you);
    const oldList = [...ONB.bots.map(b => b.trophies), oldT].sort((a, b) => b - a);

    list[newIdx].climb = oldIdx - newIdx;
    return list.map((r, i) => ({
      ...r, rank: i + 1,
      shift: r.you ? (oldIdx - newIdx) * SLOT : (i > newIdx && i <= oldIdx ? -SLOT : 0),

function FancyPack({ onOpen, opening }) {
  const t = useT();

}

Object.assign(window, { LeagueHub, RankedIntro, SwapReward });
